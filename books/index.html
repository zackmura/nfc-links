<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Mundo 3D - Experience</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

   <style>
    :root {
        --bg-color: #0f0f0f;
        --page-bg: #ffffff;
        --speed: 0.7s; /* Velocidade da dobra */
    }

    body { 
        margin: 0; background-color: var(--bg-color); 
        display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
    }

    #viewer-container {
        flex: 1; perspective: 2000px; /* Profundidade 3D acentuada */
        display: flex; justify-content: center; align-items: center;
        position: relative;
    }

    #viewer { 
        width: 90%; height: 85%; 
        background: var(--page-bg); 
        box-shadow: 0 10px 50px rgba(0,0,0,0.6);
        border-radius: 2px 10px 10px 2px;
        transform-origin: left center; /* Fixa a "lombada" na esquerda */
        transition: transform var(--speed) ease-in-out, filter var(--speed);
        backface-visibility: hidden;
    }

    /* Efeito de Dobra Realista */
    .flip-next {
        transform: rotateY(-110deg) scale(0.95); /* A página "levanta" e gira */
        filter: brightness(0.4); /* Escurece a página enquanto dobra */
        pointer-events: none;
    }

    /* Zonas de toque */
    .touch-zone {
        position: absolute; top: 0; bottom: 0; width: 30%; z-index: 100;
    }
    #zone-prev { left: 0; }
    #zone-next { right: 0; }

    #loading { position: absolute; color: #555; width: 100%; text-align: center; top: 20px; }
</style>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const bookParam = urlParams.get('books');
        const viewer = document.getElementById('viewer');

        if (!bookParam) return;

        const book = ePub("./books/" + bookParam + ".epub");
        const rendition = book.renderTo("viewer", {
            width: "100%", height: "100%", flow: "paginated"
        });

        book.opened.then(() => {
            document.getElementById('loading').style.display = 'none';
            rendition.display();
        });

        // Lógica de Dobra 3D
        const turnPage = (dir) => {
            if (dir === 'next') {
                viewer.classList.add('flip-next');
                
                // No meio da animação (quando a página está "em pé"), trocamos o conteúdo
                setTimeout(() => {
                    rendition.next();
                    // Pequeno truque: removemos a animação para a página "voltar" com o novo conteúdo
                    viewer.style.transition = "none";
                    viewer.classList.remove('flip-next');
                    
                    // Forçamos um reflow e devolvemos a transição
                    void viewer.offsetWidth; 
                    viewer.style.transition = "transform var(--speed) ease-in-out, filter var(--speed)";
                }, 400); 
            } else {
                // Para o "Anterior", fazemos o efeito inverso se desejar, 
                // ou apenas um fade rápido para simplificar
                viewer.style.opacity = "0";
                setTimeout(() => {
                    rendition.prev();
                    viewer.style.opacity = "1";
                }, 200);
            }
        };

        document.getElementById('zone-next').onclick = () => turnPage('next');
        document.getElementById('zone-prev').onclick = () => turnPage('prev');
        
        // Suporte a Swipe
        let xDown = null;
        document.addEventListener('touchstart', e => xDown = e.touches[0].clientX);
        document.addEventListener('touchmove', e => {
            if (!xDown) return;
            let xDiff = xDown - e.touches[0].clientX;
            if (Math.abs(xDiff) > 50) {
                turnPage(xDiff > 0 ? 'next' : 'prev');
                xDown = null;
            }
        });
    };
</script>
</body>
</html>
