<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Mundo 3D - Immersive Reader</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        :root {
            --primary: #ff4757;
            --bg: #121212;
            --paper: #ffffff;
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; 
            height: 100vh; width: 100vw;
            overflow: hidden; 
            color: white;
        }

        /* Contêiner principal ajustado para Mobile */
        #viewer-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            perspective: 1000px; /* Prepara para efeitos 3D */
        }

        #viewer { 
            width: 100%; 
            max-width: 800px; /* Limita largura no desktop */
            height: 100%; 
            background: var(--paper); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border-radius: 8px;
            transition: transform 0.5s ease; /* Transição suave */
        }

        /* Controles flutuantes na parte inferior */
        .controls { 
            height: 80px;
            display: flex; 
            justify-content: center;
            align-items: center;
            gap: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            width: 100%;
        }

        button { 
            padding: 12px 28px; 
            cursor: pointer; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-size: 14px; 
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.9); }

        #loading { 
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; z-index: 100;
        }

        /* Ajuste específico para o conteúdo do ePub ficar legível no celular */
        .epub-view {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loading">
        <h2 id="status-msg">Carregando Experiência...</h2>
    </div>

    <div id="viewer-container">
        <div id="viewer"></div>
    </div>

    <div class="controls">
        <button id="prev">Anterior</button>
        <button id="next">Próxima</button>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookParam = urlParams.get('books');
            const status = document.getElementById('status-msg');

            if (!bookParam) {
                status.innerHTML = "Aproxime a Tag NFC Mini Mundo";
                return;
            }

            // Testamos os caminhos (GitHub Pages costuma usar o primeiro)
            const paths = ["./books/" + bookParam + ".epub", "./" + bookParam + ".epub"];
            let pathIdx = 0;

            function loadBook(url) {
                const book = ePub(url);
                
                // Rendition ajustado para Mobile
                const rendition = book.renderTo("viewer", {
                    width: "100%",
                    height: "100%",
                    flow: "paginated",
                    manager: "default",
                    allowScriptedContent: true // Tenta contornar alguns erros de console
                });

                book.opened.then(() => {
                    document.getElementById('loading').style.display = 'none';
                    rendition.display();
                }).catch(err => {
                    if(pathIdx < paths.length - 1) {
                        pathIdx++;
                        loadBook(paths[pathIdx]);
                    } else {
                        status.innerHTML = "Erro ao localizar livro.";
                    }
                });

                // Lógica de navegação com animação simples
                const navigate = (dir) => {
                    const v = document.getElementById('viewer');
                    v.style.opacity = "0.5";
                    v.style.transform = dir === 'next' ? "translateX(-10px)" : "translateX(10px)";
                    
                    setTimeout(() => {
                        if(dir === 'next') rendition.next();
                        else rendition.prev();
                        v.style.opacity = "1";
                        v.style.transform = "translateX(0)";
                    }, 150);
                };

                document.getElementById('prev').onclick = () => navigate('prev');
                document.getElementById('next').onclick = () => navigate('next');
                
                // Swipe para celular
                let touchstartX = 0;
                let touchendX = 0;
                document.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
                document.addEventListener('touchend', e => {
                    touchendX = e.changedTouches[0].screenX;
                    if (touchstartX - touchendX > 50) navigate('next');
                    if (touchendX - touchstartX > 50) navigate('prev');
                });
            }

            loadBook(paths[0]);
        };
    </script>
</body>
</html>
