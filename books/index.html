<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Mundo 3D - Experience</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        :root {
            /* PALETA MINI MUNDO UNIFICADA */
            --bg-color: #fcfaf5;    /* Fundo externo claro e elegante */
            --page-bg: #fcfaf5;     /* Fundo da página idêntico para harmonia */
            --text-color: #3d342d;  /* Texto marrom terroso */
            --accent: #8b5a2b;      /* Marrom vivo para botões e ícones */
            --speed: 0.35s; 
        }

        body { 
            margin: 0; background-color: var(--bg-color); 
            height: 100vh; overflow: hidden; 
            font-family: 'Georgia', serif; 
        }

        /* --- CABEÇALHO --- */
        #brand-header {
            position: absolute; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 100;
        }

        #brand-header img {
            max-height: 45px; mix-blend-mode: multiply; /* Integração perfeita do logo */
        }

        #reset-btn {
            background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 8px 16px; border-radius: 20px;
            font-size: 11px; cursor: pointer; font-family: 'Segoe UI', sans-serif;
            text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
            transition: all 0.3s ease; outline: none;
        }
        #reset-btn:hover { background: var(--accent); color: white; }

        /* --- MODAL CUSTOMIZADO MINI MUNDO --- */
        #custom-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(61, 52, 45, 0.4); /* Fundo escuro amadeirado translúcido */
            backdrop-filter: blur(4px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }

        #custom-modal.show { opacity: 1; pointer-events: all; }

        .modal-content {
            background: var(--page-bg); padding: 35px 25px; border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2); text-align: center;
            border: 1px solid #eadecb; width: 85%; max-width: 320px;
            transform: translateY(20px); transition: transform 0.3s ease;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        #custom-modal.show .modal-content { transform: translateY(0); }

        .modal-logo {
            max-height: 45px; margin-bottom: 15px; mix-blend-mode: multiply;
        }

        /* Ícone de Recarregar Corrigido (Sem bolota marrom) */
        .modal-icon {
            width: 36px; height: 36px; margin-bottom: 15px;
            stroke: var(--accent); fill: none;
        }

        .modal-content p {
            color: var(--text-color); font-size: 15px; margin-bottom: 25px; line-height: 1.5; font-weight: 500;
        }

        .modal-buttons { display: flex; gap: 15px; width: 100%; }

        .modal-buttons button {
            padding: 12px 0; flex: 1; border-radius: 25px; border: none; cursor: pointer;
            font-weight: bold; text-transform: uppercase; font-size: 12px; transition: 0.2s;
        }

        #btn-cancel { 
            background: transparent; border: 1px solid #b5a99f; color: #8a7c71; 
        }
        #btn-confirm { 
            background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(139, 90, 43, 0.25);
        }

        /* --- ÁREA DO LIVRO --- */
        #viewer-container {
            flex: 1; height: 100vh; perspective: 1500px;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        #viewer-wrapper {
            width: 90%; height: 80%; margin-top: 40px;
            background: var(--page-bg); border-radius: 4px;
            /* Sombra elegante que separa o livro do fundo da mesma cor */
            box-shadow: 0 10px 40px rgba(61, 52, 45, 0.12);
            z-index: 5; border: 1px solid #eadecb;
        }

        #viewer { width: 100%; height: 100%; }

        .touch-zone { position: absolute; top: 0; bottom: 0; width: 35%; z-index: 10; -webkit-tap-highlight-color: transparent;}
        #zone-prev { left: 0; }
        #zone-next { right: 0; }

        #loading { 
            position: absolute; color: var(--text-color); width: 100%; 
            text-align: center; top: 50%; transform: translateY(-50%);
            font-style: italic; opacity: 0.8; font-family: 'Segoe UI', sans-serif; font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div id="brand-header">
        <img src="logo.jpg" alt="Mini Mundo 3D">
        <button id="reset-btn">Recomeçar</button>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <img src="logo.jpg" alt="Mini Mundo" class="modal-logo">
            
            <svg class="modal-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
            </svg>

            <p>Deseja reiniciar a leitura e voltar para a primeira página?</p>
            
            <div class="modal-buttons">
                <button id="btn-cancel">Cancelar</button>
                <button id="btn-confirm">Sim</button>
            </div>
        </div>
    </div>

    <div id="loading">Sincronizando sua leitura...</div>

    <div id="viewer-container">
        <div id="zone-prev" class="touch-zone"></div>
        <div id="viewer-wrapper">
            <div id="viewer"></div>
        </div>
        <div id="zone-next" class="touch-zone"></div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookParam = urlParams.get('books');
            const wrapper = document.getElementById('viewer-wrapper');

            if (!bookParam) return;

            const storageKey = 'minimundo_v2_' + bookParam;
            const book = ePub("./books/" + bookParam + ".epub");
            
            const rendition = book.renderTo("viewer", {
                width: "100%", height: "100%", flow: "paginated", manager: "default", spread: "none"
            });

            // Forçando as Cores Terrosas de forma segura
            rendition.hooks.content.register(function(contents) {
                contents.addStylesheetRules([
                    ["body", ["background-color", "transparent", "padding", "8% 6% !important"]],
                    ["p", ["color", "#3d342d !important", "line-height", "1.6 !important", "font-size", "115% !important"]],
                    ["h1, h2, h3", ["color", "#5c412b !important"]],
                    ["span, div", ["color", "#3d342d !important"]]
                ]);
            });

            // Persistência
            Promise.all([book.ready, book.opened]).then(() => {
                const savedLoc = localStorage.getItem(storageKey);
                document.getElementById('loading').style.display = 'none';
                rendition.display(savedLoc || undefined);
            });

            rendition.on("relocated", (loc) => {
                if (loc && loc.start) localStorage.setItem(storageKey, loc.start.cfi);
            });

            // Lógica do Modal
            const modal = document.getElementById('custom-modal');
            
            document.getElementById('reset-btn').onclick = () => modal.classList.add('show');
            document.getElementById('btn-cancel').onclick = () => modal.classList.remove('show');
            document.getElementById('btn-confirm').onclick = () => {
                localStorage.removeItem(storageKey);
                location.reload(); 
            };

            // Animação 3D do Wrapper
            const turnPage = (dir) => {
                wrapper.style.transformOrigin = dir === 'next' ? "left center" : "right center";
                wrapper.style.transition = "transform var(--speed) ease-in, filter var(--speed) ease-in";
                wrapper.style.transform = dir === 'next' ? "rotateY(-90deg) scale(0.96)" : "rotateY(90deg) scale(0.96)";
                wrapper.style.filter = "brightness(0.9)";

                setTimeout(() => {
                    if (dir === 'next') rendition.next(); else rendition.prev();
                    
                    wrapper.style.transition = "none";
                    wrapper.style.transform = dir === 'next' ? "rotateY(90deg) scale(0.96)" : "rotateY(-90deg) scale(0.96)";
                    void wrapper.offsetWidth; 
                    
                    wrapper.style.transition = "transform var(--speed) ease-out, filter var(--speed) ease-out";
                    wrapper.style.transform = "rotateY(0deg) scale(1)";
                    wrapper.style.filter = "brightness(1)";
                }, 350);
            };

            document.getElementById('zone-next').onclick = () => turnPage('next');
            document.getElementById('zone-prev').onclick = () => turnPage('prev');

            let xDown = null;
            document.addEventListener('touchstart', e => xDown = e.touches[0].clientX);
            document.addEventListener('touchmove', e => {
                if (!xDown) return;
                let xDiff = xDown - e.touches[0].clientX;
                if (Math.abs(xDiff) > 40) {
                    turnPage(xDiff > 0 ? 'next' : 'prev');
                    xDown = null;
                }
            });
        };
    </script>
</body>
</html>
