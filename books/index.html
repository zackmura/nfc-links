<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Mundo 3D - Experience</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        :root {
            --bg-color: #efead9;    /* Fundo suave (Areia) */
            --page-bg: #fdfaf2;     /* Papel (Pergaminho claro) */
            --text-color: #3d342d;  /* Texto (Marrom terroso escuro) */
            --accent: #8b5a2b;      /* Cor de destaque para o botão */
            --speed: 0.35s; 
        }

        body { 
            margin: 0; background-color: var(--bg-color); 
            height: 100vh; overflow: hidden; 
            font-family: 'Georgia', serif; /* Fonte mais literária */
        }

        /* Cabeçalho de Identidade Visual */
        #brand-header {
            position: absolute; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; box-sizing: border-box; z-index: 100;
        }

        #brand-header img {
            max-height: 40px; mix-blend-mode: multiply;
        }

        /* Botão Recomeçar Estilizado */
        #reset-btn {
            background: none; border: 1px solid var(--accent);
            color: var(--accent); padding: 6px 12px; border-radius: 20px;
            font-size: 12px; cursor: pointer; font-family: sans-serif;
            text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
            transition: all 0.3s;
        }
        #reset-btn:hover { background: var(--accent); color: white; }

        #viewer-container {
            flex: 1; height: 100vh; perspective: 1500px;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        #viewer-wrapper {
            width: 92%; height: 82%; margin-top: 40px;
            background: var(--page-bg); border-radius: 4px;
            box-shadow: 0 10px 40px rgba(61, 52, 45, 0.15);
            z-index: 5; border: 1px solid #e3dec6;
        }

        #viewer { width: 100%; height: 100%; }

        .touch-zone { position: absolute; top: 0; bottom: 0; width: 35%; z-index: 10; }
        #zone-prev { left: 0; }
        #zone-next { right: 0; }

        #loading { 
            position: absolute; color: var(--text-color); width: 100%; 
            text-align: center; top: 50%; transform: translateY(-50%);
            font-style: italic; opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="brand-header">
        <img src="logo.jpg" alt="Mini Mundo">
        <button id="reset-btn" title="Voltar ao Início">Recomeçar</button>
    </div>

    <div id="loading">Sincronizando sua leitura...</div>

    <div id="viewer-container">
        <div id="zone-prev" class="touch-zone"></div>
        <div id="viewer-wrapper">
            <div id="viewer"></div>
        </div>
        <div id="zone-next" class="touch-zone"></div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookParam = urlParams.get('books');
            const wrapper = document.getElementById('viewer-wrapper');

            if (!bookParam) return;

            const storageKey = 'minimundo_v2_' + bookParam;
            const book = ePub("./books/" + bookParam + ".epub");
            const rendition = book.renderTo("viewer", {
                width: "100%", height: "100%", flow: "paginated", manager: "default", spread: "none"
            });

            // Configuração do Tema (Conforto Visual)
            rendition.themes.default({
                body: { "background": "transparent", "padding": "40px 30px !important" },
                p: { "color": "var(--text-color)", "line-height": "1.7", "font-size": "18px" }
            });

            // Lógica de Persistência Robusta
            Promise.all([book.ready, book.opened]).then(() => {
                const savedLoc = localStorage.getItem(storageKey);
                document.getElementById('loading').style.display = 'none';
                rendition.display(savedLoc || undefined);
            });

            // Salva apenas quando a página estabilizar
            rendition.on("relocated", (loc) => {
                if (loc && loc.start) localStorage.setItem(storageKey, loc.start.cfi);
            });

            // Botão de Reset
            document.getElementById('reset-btn').onclick = () => {
                if(confirm("Deseja voltar para a primeira página?")) {
                    localStorage.removeItem(storageKey);
                    location.reload();
                }
            };

            const turnPage = (dir) => {
                wrapper.style.transformOrigin = dir === 'next' ? "left center" : "right center";
                wrapper.style.transition = "transform var(--speed) ease-in, filter var(--speed) ease-in";
                wrapper.style.transform = dir === 'next' ? "rotateY(-90deg) scale(0.98)" : "rotateY(90deg) scale(0.98)";
                wrapper.style.filter = "brightness(0.9)";

                setTimeout(() => {
                    if (dir === 'next') rendition.next(); else rendition.prev();
                    wrapper.style.transition = "none";
                    wrapper.style.transform = dir === 'next' ? "rotateY(90deg) scale(0.98)" : "rotateY(-90deg) scale(0.98)";
                    void wrapper.offsetWidth; 
                    wrapper.style.transition = "transform var(--speed) ease-out, filter var(--speed) ease-out";
                    wrapper.style.transform = "rotateY(0deg) scale(1)";
                    wrapper.style.filter = "brightness(1)";
                }, 350);
            };

            document.getElementById('zone-next').onclick = () => turnPage('next');
            document.getElementById('zone-prev').onclick = () => turnPage('prev');
        };
    </script>
</body>
</html>
