<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Mundo 3D - Reader</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #viewer {
            width: 90vw;
            height: 80vh;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            margin-top: 20px;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background-color: #555;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="loading">Carregando livro...</div>
    <div id="viewer"></div>

    <div class="controls">
        <button id="prev">Anterior</button>
        <button id="next">Próxima</button>
    </div>

    <script>
        // 1. Captura o nome do livro da URL
        const urlParams = new URLSearchParams(window.location.search);
        let bookName = urlParams.get('books'); // Pegando o parâmetro 'books' que você usou na imagem

        // 2. Ajuste do caminho: Como seu index está dentro de /books, 
        // e o EPUB está na pasta /books/books/, precisamos ajustar:
        const bookPath = `./books/${bookName}.epub`;

        const book = ePub(bookPath);
        const rendition = book.renderTo("viewer", {
            width: "100%",
            height: "100%",
            flow: "paginated",
            manager: "default"
        });

        // Exibe o livro e esconde o "Carregando"
        book.opened.then(() => {
            document.getElementById('loading').style.display = 'none';
        });

        rendition.display();

        // Controles de navegação
        document.getElementById('prev').addEventListener('click', () => {
            rendition.prev();
        });

        document.getElementById('next').addEventListener('click', () => {
            rendition.next();
        });

        // Navegação por teclado
        document.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft") rendition.prev();
            if (e.key === "ArrowRight") rendition.next();
        });
    </script>
</body>
</html>
