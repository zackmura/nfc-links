<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Mundo 3D - Reader</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #1a1a1a; /* Escuro para destacar o livro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; 
            color: white;
        }

        #viewer { 
            width: 95vw; 
            height: 80vh; 
            background: white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-top: 20px;
            border-radius: 4px;
        }

        .controls { 
            margin-top: 20px; 
            display: flex; 
            gap: 15px; 
        }

        button { 
            padding: 12px 25px; 
            cursor: pointer; 
            background-color: #ff4757; /* Cor de destaque */
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-size: 16px; 
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background-color: #ff6b81; transform: scale(1.05); }

        #loading { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center;
            z-index: 10;
        }

        /* Estilo para o conteúdo dentro do iframe do ePub */
        .epub-container { padding: 20px; }
    </style>
</head>
<body>

    <div id="loading">
        <h2 id="status-msg">Iniciando Mini Mundo Reader...</h2>
    </div>

    <div id="viewer"></div>

    <div class="controls">
        <button id="prev">⬅ Anterior</button>
        <button id="next">Próxima ➡</button>
    </div>

    <script>
        window.onload = function() {
            const status = document.getElementById('status-msg');
            
            // 1. Verifica bibliotecas
            if (typeof ePub === 'undefined') {
                status.innerHTML = "Erro: Biblioteca ePub não carregada.";
                return;
            }

            // 2. Pega o nome do livro da URL (?books=nome)
            const urlParams = new URLSearchParams(window.location.search);
            const bookParam = urlParams.get('books');

            if (!bookParam) {
                status.innerHTML = "Aguardando Tag NFC...<br><small>(URL precisa de ?books=nome)</small>";
                return;
            }

            // 3. Função de carregamento com "Fallback" (Tenta vários caminhos)
            // Isso resolve o erro 404 se a pasta estiver duplicada
            const caminhosParaTestar = [
                "./books/" + bookParam + ".epub", // Caminho 1
                "./" + bookParam + ".epub",        // Caminho 2 (se estiver na mesma pasta)
                "books/" + bookParam + ".epub"     // Caminho 3
            ];

            let tentativaAtual = 0;

            function tentarCarregar(caminho) {
                console.log("Tentando: " + caminho);
                status.innerHTML = "Abrindo: " + bookParam + ".epub...";
                
                const book = ePub(caminho);
                const rendition = book.renderTo("viewer", {
                    width: "100%",
                    height: "100%",
                    flow: "paginated", // Estilo livro
                    manager: "default"
                });

                book.opened.then(() => {
                    console.log("Sucesso ao carregar: " + caminho);
                    document.getElementById('loading').style.display = 'none';
                    rendition.display();
                }).catch(err => {
                    console.warn("Falha no caminho: " + caminho);
                    tentativaAtual++;
                    if (tentativaAtual < caminhosParaTestar.length) {
                        tentarCarregar(caminhosParaTestar[tentativaAtual]);
                    } else {
                        status.innerHTML = "Erro 404: Arquivo não encontrado.<br>Certifique-se que o nome no GitHub está igual ao da URL.";
                    }
                });

                // Reatribui os botões ao novo 'rendition'
                document.getElementById('prev').onclick = () => rendition.prev();
                document.getElementById('next').onclick = () => rendition.next();

                // Setas do teclado
                document.onkeyup = function(e) {
                    if (e.key === "ArrowLeft") rendition.prev();
                    if (e.key === "ArrowRight") rendition.next();
                };
            }

            tentarCarregar(caminhosParaTestar[0]);
        };
    </script>
</body>
</html>
