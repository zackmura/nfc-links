<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Mundo 3D - Reader</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        #viewer { width: 90vw; height: 80vh; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.2); margin-top: 20px; }
        .controls { margin-top: 20px; display: flex; gap: 20px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #333; color: white; border: none; border-radius: 5px; font-size: 16px; }
        button:hover { background-color: #555; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading">Carregando motor de leitura...</div>
    <div id="viewer"></div>

    <div class="controls">
        <button id="prev">Anterior</button>
        <button id="next">Próxima</button>
    </div>

    <script>
        window.onload = function() {
            // 1. Verifica se a biblioteca carregou
            if (typeof ePub === 'undefined') {
                document.getElementById('loading').innerHTML = "Erro: Biblioteca ePub não carregada. Verifique sua conexão.";
                return;
            }

            document.getElementById('loading').innerHTML = "Buscando arquivo do livro...";

            // 2. Captura o nome do livro
            const urlParams = new URLSearchParams(window.location.search);
            const bookParam = urlParams.get('books');

            if (!bookParam) {
                document.getElementById('loading').innerHTML = "Erro: Nenhum livro especificado na URL (?books=...)";
                return;
            }

            // 3. AJUSTE DE CAMINHO: 
            // Se o index está em /books/ e o epub em /books/books/
            const bookPath = "./books/" + bookParam + ".epub";

            const book = ePub(bookPath);
            const rendition = book.renderTo("viewer", {
                width: "100%",
                height: "100%",
                flow: "paginated",
                manager: "default"
            });

            book.opened.then(() => {
                document.getElementById('loading').style.display = 'none';
            }).catch(err => {
                document.getElementById('loading').innerHTML = "Erro ao abrir o arquivo .epub. Verifique se o nome está correto.";
                console.error(err);
            });

            rendition.display();

            // Controles
            document.getElementById('prev').onclick = () => rendition.prev();
            document.getElementById('next').onclick = () => rendition.next();
            
            document.addEventListener("keyup", (e) => {
                if (e.key === "ArrowLeft") rendition.prev();
                if (e.key === "ArrowRight") rendition.next();
            });
        };
    </script>
</body>
</html>
