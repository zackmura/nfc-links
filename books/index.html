<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Mundo 3D - Leitor Imersivo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        :root {
            /* Paleta Clean / Light Mode (Baseada no fundo do seu logo) */
            --bg-color: #ffffff;    /* Fundo branco puro do site */
            --page-bg: #fdfcf9;     /* Cor da página: um "off-white" levíssimo para destacar do fundo */
            --text-color: #2b2b2b;  /* Cinza muito escuro para leitura confortável */
            --speed: 0.35s; 
        }

        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        /* Logo no Topo Esquerdo */
        #brand-header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none; 
        }

        #brand-header img {
            max-height: 45px;
            /* O comando abaixo faz o fundo branco do seu JPG sumir e se misturar com o site! */
            mix-blend-mode: multiply; 
        }

        /* Container do Livro */
        #viewer-container {
            flex: 1; 
            height: 100vh; 
            perspective: 1500px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background-color: var(--bg-color);
            position: relative;
        }

        #viewer { 
            width: 90%; 
            height: 80%; /* Altura ajustada para dar espaço ao logo no topo */
            margin-top: 30px; 
            background: var(--page-bg); 
            /* Sombra mais suave já que o site agora é claro */
            box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            border-radius: 4px;
            z-index: 5;
            border: 1px solid #eaeaea; /* Borda fininha para delimitar a página */
        }

        /* Zonas de Toque nas laterais */
        .touch-zone { 
            position: absolute; top: 0; bottom: 0; width: 35%; 
            z-index: 100; -webkit-tap-highlight-color: transparent; 
        }
        #zone-prev { left: 0; }
        #zone-next { right: 0; }

        /* Estilo do Loading */
        #loading { 
            position: absolute; color: var(--text-color); width: 100%; text-align: center; 
            top: 50%; transform: translateY(-50%); z-index: 1; font-weight: 500;
            font-size: 1.1rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="brand-header">
        <img src="logo.jpg" alt="Mini Mundo Impressão 3D">
    </div>

    <div id="loading">Abrindo seu livro...</div>

    <div id="viewer-container">
        <div id="zone-prev" class="touch-zone"></div>
        <div id="viewer"></div>
        <div id="zone-next" class="touch-zone"></div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookParam = urlParams.get('books');
            const viewer = document.getElementById('viewer');

            if (!bookParam) {
                document.getElementById('loading').innerHTML = "Aproxime a Tag NFC Mini Mundo";
                return;
            }

            const bookPath = "./books/" + bookParam + ".epub";
            const book = ePub(bookPath);
            
            // CONFIGURAÇÃO CORRIGIDA PARA PERSISTÊNCIA: spread: "none"
            const rendition = book.renderTo("viewer", {
                width: "100%", 
                height: "100%", 
                flow: "paginated", 
                manager: "default",
                spread: "none" // Obriga a ser 1 página por vez, resolvendo o bug do PC vs Celular
            });

            // Ajuste do tema para o modo claro
            rendition.themes.default({
                body: { "background": "transparent" },
                p: { "color": "var(--text-color)", "line-height": "1.6" },
                h1: { "color": "#000" },
                h2: { "color": "#000" }
            });

            const storageKey = 'minimundo_leitura_' + bookParam;
            const paginaSalva = localStorage.getItem(storageKey);

            book.opened.then(() => {
                document.getElementById('loading').style.display = 'none';
                
                if (paginaSalva) {
                    rendition.display(paginaSalva);
                } else {
                    rendition.display();
                }
            });

            // Salva a página exata toda vez que muda
            rendition.on("relocated", function(location) {
                if (location && location.start) {
                    localStorage.setItem(storageKey, location.start.cfi);
                }
            });

            // Efeito 3D (Ajustado para o fundo claro)
            const turnPage = (dir) => {
                viewer.style.transformOrigin = dir === 'next' ? "left center" : "right center";
                viewer.style.transition = "transform var(--speed) ease-in, filter var(--speed) ease-in";
                viewer.style.transform = dir === 'next' ? "rotateY(-90deg) scale(0.95)" : "rotateY(90deg) scale(0.95)";
                viewer.style.filter = "brightness(0.85)"; // Escurece um pouco menos no fundo branco

                setTimeout(() => {
                    if (dir === 'next') rendition.next();
                    else rendition.prev();

                    viewer.style.transition = "none";
                    viewer.style.transform = dir === 'next' ? "rotateY(90deg) scale(0.95)" : "rotateY(-90deg) scale(0.95)";
                    
                    void viewer.offsetWidth; 

                    viewer.style.transition = "transform var(--speed) ease-out, filter var(--speed) ease-out";
                    viewer.style.transform = "rotateY(0deg) scale(1)";
                    viewer.style.filter = "brightness(1)";
                }, 350); 
            };

            document.getElementById('zone-next').onclick = () => turnPage('next');
            document.getElementById('zone-prev').onclick = () => turnPage('prev');

            let xDown = null;
            document.addEventListener('touchstart', e => xDown = e.touches[0].clientX);
            document.addEventListener('touchmove', e => {
                if (!xDown) return;
                let xDiff = xDown - e.touches[0].clientX;
                if (Math.abs(xDiff) > 40) {
                    turnPage(xDiff > 0 ? 'next' : 'prev');
                    xDown = null;
                }
            });
        };
    </script>
</body>
</html>
