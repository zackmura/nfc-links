<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Mundo 3D - Leitor Imersivo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        :root {
            /* Paleta Sépia / Descanso Visual */
            --bg-color: #f5f2eb;    /* Fundo da tela: um off-white muito suave */
            --page-bg: #f9eed7;     /* Papel: tom de areia/pergaminho quente */
            --text-color: #3b2f27;  /* Texto: marrom escuro quente (sem usar preto puro) */
            --speed: 0.35s; 
        }

        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        /* Logo no Topo Esquerdo */
        #brand-header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none; 
        }

        #brand-header img {
            max-height: 45px;
            mix-blend-mode: multiply; /* Apaga o fundo branco do logo */
        }

        /* Container Principal */
        #viewer-container {
            flex: 1; 
            height: 100vh; 
            perspective: 1500px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            position: relative;
        }

        /* O WRAPPER: É ele quem sofre as animações 3D agora */
        #viewer-wrapper {
            width: 90%; 
            height: 80%; 
            margin-top: 30px; 
            background: var(--page-bg); 
            box-shadow: 0 5px 25px rgba(0,0,0,0.12);
            border-radius: 4px;
            z-index: 5;
            border: 1px solid #e8dec7; /* Borda fininha e elegante */
        }

        /* O LEITOR: Fica estático, sem se confundir com animações */
        #viewer { 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
        }

        /* Zonas de Toque nas laterais */
        .touch-zone { 
            position: absolute; top: 0; bottom: 0; width: 35%; 
            z-index: 100; -webkit-tap-highlight-color: transparent; 
        }
        #zone-prev { left: 0; }
        #zone-next { right: 0; }

        #loading { 
            position: absolute; color: var(--text-color); width: 100%; text-align: center; 
            top: 50%; transform: translateY(-50%); z-index: 1; font-weight: 500;
            font-size: 1.1rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="brand-header">
        <img src="logo.jpg" alt="Mini Mundo Impressão 3D">
    </div>

    <div id="loading">Abrindo seu livro...</div>

    <div id="viewer-container">
        <div id="zone-prev" class="touch-zone"></div>
        
        <div id="viewer-wrapper">
            <div id="viewer"></div>
        </div>
        
        <div id="zone-next" class="touch-zone"></div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookParam = urlParams.get('books');
            
            // Agora a animação acontece no wrapper
            const viewerWrapper = document.getElementById('viewer-wrapper'); 

            if (!bookParam) {
                document.getElementById('loading').innerHTML = "Aproxime a Tag NFC Mini Mundo";
                return;
            }

            const bookPath = "./books/" + bookParam + ".epub";
            const book = ePub(bookPath);
            
            const rendition = book.renderTo("viewer", {
                width: "100%", 
                height: "100%", 
                flow: "paginated", 
                manager: "default",
                spread: "none"
            });

            // Tema de Leitura Confortável (Sépia)
            rendition.themes.default({
                body: { 
                    "background": "transparent", 
                    "padding": "4% 6% !important" /* Desgruda o texto das bordas */
                },
                p: { 
                    "color": "var(--text-color)", 
                    "line-height": "1.6", 
                    "font-size": "110%" /* Aumenta um pouquinho a letra para celular */
                },
                h1: { "color": "#2c221b" },
                h2: { "color": "#2c221b" }
            });

            const storageKey = 'minimundo_leitura_' + bookParam;
            const paginaSalva = localStorage.getItem(storageKey);

            book.opened.then(() => {
                document.getElementById('loading').style.display = 'none';
                
                if (paginaSalva) {
                    rendition.display(paginaSalva);
                } else {
                    rendition.display();
                }
            });

            rendition.on("relocated", function(location) {
                if (location && location.start) {
                    localStorage.setItem(storageKey, location.start.cfi);
                }
            });

            // Animação 3D aplicada APENAS no Wrapper
            const turnPage = (dir) => {
                viewerWrapper.style.transformOrigin = dir === 'next' ? "left center" : "right center";
                viewerWrapper.style.transition = "transform var(--speed) ease-in, filter var(--speed) ease-in";
                viewerWrapper.style.transform = dir === 'next' ? "rotateY(-90deg) scale(0.95)" : "rotateY(90deg) scale(0.95)";
                viewerWrapper.style.filter = "brightness(0.85)";

                setTimeout(() => {
                    if (dir === 'next') rendition.next();
                    else rendition.prev();

                    viewerWrapper.style.transition = "none";
                    viewerWrapper.style.transform = dir === 'next' ? "rotateY(90deg) scale(0.95)" : "rotateY(-90deg) scale(0.95)";
                    
                    void viewerWrapper.offsetWidth; 

                    viewerWrapper.style.transition = "transform var(--speed) ease-out, filter var(--speed) ease-out";
                    viewerWrapper.style.transform = "rotateY(0deg) scale(1)";
                    viewerWrapper.style.filter = "brightness(1)";
                }, 350); 
            };

            document.getElementById('zone-next').onclick = () => turnPage('next');
            document.getElementById('zone-prev').onclick = () => turnPage('prev');

            let xDown = null;
            document.addEventListener('touchstart', e => xDown = e.touches[0].clientX);
            document.addEventListener('touchmove', e => {
                if (!xDown) return;
                let xDiff = xDown - e.touches[0].clientX;
                if (Math.abs(xDiff) > 40) {
                    turnPage(xDiff > 0 ? 'next' : 'prev');
                    xDown = null;
                }
            });
        };
    </script>
</body>
</html>
