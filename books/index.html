<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Mundo 3D - Experience</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        :root {
            --bg-color: #0a0a0a;
            --page-bg: #ffffff;
            --speed: 0.35s; /* Metade do tempo da animação total */
        }

        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        #viewer-container {
            flex: 1; 
            height: 100vh; 
            perspective: 1500px; /* Câmera 3D */
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: radial-gradient(circle, #2a2a2a 0%, #000000 100%);
            position: relative;
        }

        #viewer { 
            width: 90%; 
            height: 85%; 
            background: var(--page-bg); 
            box-shadow: 0 5px 30px rgba(0,0,0,0.8);
            border-radius: 4px;
            z-index: 5;
            /* A transição será controlada 100% pelo JavaScript agora */
        }

        /* Zonas Invisíveis para toque */
        .touch-zone { 
            position: absolute; top: 0; bottom: 0; width: 35%; 
            z-index: 100; -webkit-tap-highlight-color: transparent; 
        }
        #zone-prev { left: 0; }
        #zone-next { right: 0; }

        #loading { 
            position: absolute; color: #fff; width: 100%; text-align: center; 
            top: 50%; transform: translateY(-50%); z-index: 1; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loading">Conectando ao Mini Mundo...</div>

    <div id="viewer-container">
        <div id="zone-prev" class="touch-zone"></div>
        <div id="viewer"></div>
        <div id="zone-next" class="touch-zone"></div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookParam = urlParams.get('books');
            const viewer = document.getElementById('viewer');

            if (!bookParam) {
                document.getElementById('loading').innerHTML = "Aguardando Tag NFC...";
                return;
            }

            const bookPath = "./books/" + bookParam + ".epub";
            const book = ePub(bookPath);
            const rendition = book.renderTo("viewer", {
                width: "100%", height: "100%", flow: "paginated", manager: "default"
            });

            book.opened.then(() => {
                document.getElementById('loading').style.display = 'none';
                rendition.display();
            }).catch(err => {
                document.getElementById('loading').innerHTML = "Erro ao carregar o livro.";
            });

            // Lógica de Dobra 3D Simétrica (Funciona perfeito para ir e voltar)
            const turnPage = (dir) => {
                // 1. Define onde fica a lombada (esquerda para avançar, direita para voltar)
                viewer.style.transformOrigin = dir === 'next' ? "left center" : "right center";
                
                // 2. Inicia o giro da página para "fechar"
                viewer.style.transition = "transform var(--speed) ease-in, filter var(--speed) ease-in";
                viewer.style.transform = dir === 'next' ? "rotateY(-90deg) scale(0.95)" : "rotateY(90deg) scale(0.95)";
                viewer.style.filter = "brightness(0.5)"; // Escurece enquanto gira

                // 3. Espera a página ficar exatamente de lado (90 graus)
                setTimeout(() => {
                    // Troca o texto do Epub.js
                    if (dir === 'next') rendition.next();
                    else rendition.prev();

                    // Prepara a nova página do lado oposto, pronta para "abrir"
                    viewer.style.transition = "none";
                    viewer.style.transform = dir === 'next' ? "rotateY(90deg) scale(0.95)" : "rotateY(-90deg) scale(0.95)";
                    
                    // Força o navegador a renderizar o pulo invisível
                    void viewer.offsetWidth; 

                    // 4. Anima a página nova "caindo" de volta para o centro
                    viewer.style.transition = "transform var(--speed) ease-out, filter var(--speed) ease-out";
                    viewer.style.transform = "rotateY(0deg) scale(1)";
                    viewer.style.filter = "brightness(1)";

                }, 350); // Deve ser exatamente o tempo definido na variável --speed (0.35s)
            };

            // Controles de Clique
            document.getElementById('zone-next').onclick = () => turnPage('next');
            document.getElementById('zone-prev').onclick = () => turnPage('prev');

            // Controles de Deslize (Swipe)
            let xDown = null;
            document.addEventListener('touchstart', e => xDown = e.touches[0].clientX);
            document.addEventListener('touchmove', e => {
                if (!xDown) return;
                let xDiff = xDown - e.touches[0].clientX;
                if (Math.abs(xDiff) > 40) { // Sensibilidade do swipe
                    turnPage(xDiff > 0 ? 'next' : 'prev');
                    xDown = null;
                }
            });
        };
    </script>
</body>
</html>
