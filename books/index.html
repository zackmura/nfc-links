<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Mundo 3D - Experience</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --page-bg: #fff;
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            font-family: sans-serif;
            display: flex; flex-direction: column; 
            height: 100vh; width: 100vw;
            overflow: hidden; 
        }

        /* Área do Livro */
        #viewer-container {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
        }

        #viewer { 
            width: 95%; 
            height: 90%; 
            background: var(--page-bg); 
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border-radius: 4px;
            transition: all 0.6s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-origin: left center;
        }

        /* Camadas de interação invisíveis (Clique nas laterais) */
        .touch-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 25%;
            z-index: 10;
            cursor: pointer;
        }
        #zone-prev { left: 0; }
        #zone-next { right: 0; }

        /* Indicador de carregamento */
        #loading {
            position: absolute; color: white; text-align: center; width: 100%;
        }

        /* Animação de Virada de Página (Simulada) */
        .page-flip-next {
            transform: rotateY(-20deg) translateX(-100%) scale(0.9);
            opacity: 0;
        }
        .page-flip-prev {
            transform: rotateY(20deg) translateX(100%) scale(0.9);
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="loading">Preparando sua leitura Mini Mundo...</div>

    <div id="viewer-container">
        <div id="zone-prev" class="touch-zone"></div>
        <div id="viewer"></div>
        <div id="zone-next" class="touch-zone"></div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookParam = urlParams.get('books');
            const viewer = document.getElementById('viewer');

            if (!bookParam) {
                document.getElementById('loading').innerHTML = "Aguardando comando NFC...";
                return;
            }

            const paths = ["./books/" + bookParam + ".epub", "./" + bookParam + ".epub"];
            let pathIdx = 0;

            function loadBook(url) {
                const book = ePub(url);
                const rendition = book.renderTo("viewer", {
                    width: "100%",
                    height: "100%",
                    flow: "paginated",
                    manager: "default"
                });

                book.opened.then(() => {
                    document.getElementById('loading').style.display = 'none';
                    rendition.display();
                }).catch(() => {
                    if(pathIdx < paths.length - 1) { pathIdx++; loadBook(paths[pathIdx]); }
                });

                // Função Mágica de Virar Página
                const turnPage = (dir) => {
                    const animationClass = dir === 'next' ? 'page-flip-next' : 'page-flip-prev';
                    
                    // 1. Inicia animação visual
                    viewer.classList.add(animationClass);
                    
                    setTimeout(() => {
                        // 2. Troca o conteúdo no meio da animação
                        if(dir === 'next') rendition.next();
                        else rendition.prev();
                        
                        // 3. Volta a página
                        viewer.classList.remove(animationClass);
                    }, 300);
                };

                // Eventos de Clique nas laterais
                document.getElementById('zone-next').onclick = () => turnPage('next');
                document.getElementById('zone-prev').onclick = () => turnPage('prev');

                // Suporte a Teclado
                document.onkeyup = (e) => {
                    if (e.key === "ArrowRight") turnPage('next');
                    if (e.key === "ArrowLeft") turnPage('prev');
                };

                // Suporte a Swipe (Celular)
                let xDown = null;                                                        
                document.addEventListener('touchstart', (e) => xDown = e.touches[0].clientX, false);        
                document.addEventListener('touchmove', (e) => {
                    if (!xDown) return;
                    let xUp = e.touches[0].clientX;
                    let xDiff = xDown - xUp;
                    if (Math.abs(xDiff) > 50) {
                        if (xDiff > 0) turnPage('next'); else turnPage('prev');
                        xDown = null;
                    }
                }, false);
            }

            loadBook(paths[0]);
        };
    </script>
</body>
</html>
