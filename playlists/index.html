<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Mundo - Chaveiro Inteligente</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #f7f9fc; color: #333; margin: 0; }
        .container { max-width: 400px; margin: 20px auto; background: white; padding: 30px 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        
        .logo { width: 120px; margin-bottom: 10px; }
        h2 { color: #5c3a21; margin-top: 0; } /* Cor marrom baseada na sua logo */
        p { color: #666; font-size: 15px; line-height: 1.5; }
        
        input { width: 100%; padding: 14px; margin: 15px 0; border: 2px solid #eee; border-radius: 10px; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff5722; }
        
        button { background-color: #ff5722; color: white; border: none; padding: 14px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; margin-bottom: 10px; }
        button:hover { background-color: #e64a19; transform: translateY(-2px); }
        
        .btn-secondary { background-color: #f0f0f0; color: #555; }
        .btn-secondary:hover { background-color: #e4e4e4; }

        /* Telas Ocultas por Padrão */
        #loading, #setup-form, #dashboard { display: none; }
        
        /* Estilo do Alerta Customizado (Modal) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(3px); }
        .modal-box { background: white; padding: 30px; border-radius: 16px; width: 80%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: popIn 0.3s ease-out; }
        .modal-box h3 { color: #4CAF50; margin-top: 0; font-size: 22px; }
        .modal-box button { margin-top: 20px; margin-bottom: 0; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/150" alt="Logo Mini Mundo" class="logo" id="logo-img">

    <div id="loading" style="display: block;">
        <p>Conectando ao chaveiro...</p>
    </div>

    <div id="setup-form">
        <h2>Configurar Chaveiro</h2>
        <p>Seu chaveiro está vazio. Cole abaixo o link da sua música ou playlist (Spotify, YouTube, etc.):</p>
        <input type="text" id="playlist-url" placeholder="Ex: https://open.spotify.com/...">
        <button onclick="salvarPlaylist()">Salvar Música</button>
    </div>

    <div id="dashboard">
        <h2>Seu Chaveiro</h2>
        <p>O que você deseja fazer agora?</p>
        <button onclick="abrirMusica()">🎧 Ouvir Música</button>
        <button class="btn-secondary" onclick="mostrarFormulario()">✏️ Alterar o Link</button>
    </div>
</div>

<div class="modal-overlay" id="success-modal">
    <div class="modal-box">
        <h3>Sucesso! 🎉</h3>
        <p>A música do seu chaveiro foi atualizada.</p>
        <button onclick="fecharModalEOuvir()">Tocar Agora</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://minimundo-nfc-music-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const chaveiroId = urlParams.get('id');

    let linkAtualSalvo = ""; // Variável para guardar o link que veio do banco

    const loadingDiv = document.getElementById('loading');
    const formDiv = document.getElementById('setup-form');
    const dashboardDiv = document.getElementById('dashboard');
    const modal = document.getElementById('success-modal');

    if (!chaveiroId) {
        loadingDiv.innerHTML = "<p>Erro: Chaveiro não identificado.</p>";
    } else {
        // Consulta o banco
        db.ref('chaveiros/' + chaveiroId).once('value').then((snapshot) => {
            linkAtualSalvo = snapshot.val();
            
            loadingDiv.style.display = 'none';
            if (linkAtualSalvo) {
                dashboardDiv.style.display = 'block'; // Mostra os botões
            } else {
                formDiv.style.display = 'block'; // Mostra o form
            }
        }).catch((error) => {
            loadingDiv.innerHTML = "<p>Erro de conexão com a Mini Mundo.</p>";
        });
    }

    // Ações dos botões do Dashboard
    function abrirMusica() {
        window.location.href = linkAtualSalvo;
    }

    function mostrarFormulario() {
        dashboardDiv.style.display = 'none';
        formDiv.style.display = 'block';
        // Se quiser, pode preencher o input com o link atual:
        // document.getElementById('playlist-url').value = linkAtualSalvo;
    }

    // Lógica de salvar
    function salvarPlaylist() {
        const inputText = document.getElementById('playlist-url').value;
        const urlMatch = inputText.match(/(https?:\/\/[^\s]+)/);
        
        if (urlMatch) {
            const linkLimpo = urlMatch[0]; 
            const botaoSalvar = document.querySelector('#setup-form button');
            botaoSalvar.innerText = "Gravando...";
            
            db.ref('chaveiros/' + chaveiroId).set(linkLimpo).then(() => {
                linkAtualSalvo = linkLimpo; // Atualiza a variável na memória
                botaoSalvar.innerText = "Salvar Música";
                document.getElementById('playlist-url').value = ""; // limpa o campo
                
                // Esconde o formulário e mostra o Modal de sucesso
                formDiv.style.display = 'none';
                modal.style.display = 'flex';
            });
        } else {
            alert("Por favor, cole um link válido."); // Esse alert nativo pode ficar, pois é só um erro rápido de digitação
        }
    }

    // Ação do botão dentro do Modal
    function fecharModalEOuvir() {
        modal.style.display = 'none';
        abrirMusica();
    }
</script>

</body>
</html>
