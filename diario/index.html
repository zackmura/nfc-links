<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Mundo 3D - Diário Inteligente</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4A2E1B; 
            --accent-color: #E27D60;  
            --bg-color: #f4f7f6;
            --text-color: #333;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .container { 
            max-width: 450px; 
            width: 100%;
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            box-sizing: border-box;
            text-align: center;
        }
        
        .logo { max-width: 120px; margin-bottom: 15px; }
        
        h2 { color: var(--primary-color); margin-top: 0; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        
        .btn-google {
            background-color: white; color: #444; border: 1px solid #ccc; 
            padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; 
            width: 100%; font-size: 16px; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn-google:hover { background-color: #f9f9f9; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-google img { width: 20px; }

        button { 
            background-color: var(--primary-color); color: white; border: none; 
            padding: 14px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; 
            width: 100%; font-size: 16px; transition: all 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        button:hover { background-color: #311e12; }
        
        .btn-secondary { background-color: transparent; color: #888; border: none; font-size: 14px; margin-top: 15px; padding: 10px; }
        .btn-secondary:hover { color: #d9534f; background-color: transparent; text-decoration: underline; }

        .user-profile {
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;
            padding-bottom: 15px; border-bottom: 1px solid #eee;
        }
        .user-profile img { width: 40px; border-radius: 50%; border: 2px solid var(--accent-color); }
        .user-profile div { text-align: left; }
        .user-profile span { display: block; font-weight: bold; color: var(--primary-color); font-size: 16px; }
        .user-profile small { color: #888; font-size: 12px; }

        .date-picker {
            width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; 
            font-size: 16px; font-family: inherit; color: var(--primary-color); font-weight: bold;
            box-sizing: border-box; margin-bottom: 15px; outline: none; text-align: center;
        }
        .date-picker:focus { border-color: var(--accent-color); }

        textarea {
            width: 100%; height: 200px; padding: 15px; border: 2px solid #eee; border-radius: 10px;
            font-size: 15px; font-family: inherit; color: #444; box-sizing: border-box;
            resize: none; outline: none; line-height: 1.6; margin-bottom: 15px;
        }
        textarea:focus { border-color: var(--primary-color); }

        #loading-screen, #login-screen, #diary-screen { display: none; }
        
        .spinner {
            border: 4px solid rgba(0,0,0,0.1); border-left-color: var(--primary-color);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #custom-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 15px; text-align: center;
            max-width: 300px; width: 80%; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: popIn 0.3s ease-out;
        }
        .modal-content i { font-size: 45px; margin-bottom: 15px; }
        .modal-content h3 { margin: 0 0 10px; color: #333; }
        .modal-content p { color: #666; font-size: 14px; margin-bottom: 20px; line-height: 1.4; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-screen" style="display: block; padding: 40px 0;">
        <div class="spinner"></div>
        <span style="color: var(--primary-color); font-weight: bold;">Conectando ao diário...</span>
    </div>

    <div id="login-screen">
        <img src="logo.jpg" alt="Mini Mundo" class="logo" onerror="this.src='https://via.placeholder.com/120?text=Mini+Mundo'">
        <h2>Diário Secreto</h2>
        <p>Acesse o seu diário pessoal de forma segura. Somente você terá acesso às suas anotações.</p>
        
        <button class="btn-google" onclick="fazerLogin()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
            Entrar com o Google
        </button>
    </div>

    <div id="diary-screen">
        <div class="user-profile">
            <img id="user-photo" src="" alt="Foto de Perfil">
            <div>
                <span id="user-name">Carregando...</span>
                <small>Seu diário privado e protegido</small>
            </div>
        </div>
        
        <input type="date" id="diary-date" class="date-picker" onchange="carregarTextoDoDia()">
        
        <textarea id="diary-text" placeholder="Querido diário, hoje o meu dia foi..."></textarea>
        
        <button id="btn-salvar" onclick="salvarDiario()"><i class="fa-solid fa-lock"></i> Salvar e Trancar Dia</button>
        <button class="btn-secondary" onclick="fazerLogout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Fechar e Sair</button>
    </div>
</div>

<div id="custom-modal">
    <div class="modal-content">
        <i id="modal-icon" class="fa-solid fa-circle-check"></i>
        <h3 id="modal-title">Tudo Certo!</h3>
        <p id="modal-text">Mensagem aqui</p>
        <button id="modal-btn" onclick="fecharModal()">OK</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDs5CcY66RU5ymMHQGhI58g1aVcyn7MeAw",
      authDomain: "minimundo-diario.firebaseapp.com",
      databaseURL: "https://minimundo-diario-default-rtdb.firebaseio.com",
      projectId: "minimundo-diario",
      storageBucket: "minimundo-diario.firebasestorage.app",
      messagingSenderId: "336220925130",
      appId: "1:336220925130:web:d846cc4be80e0f7a53d833"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const loadingScreen = document.getElementById('loading-screen');
    const loginScreen = document.getElementById('login-screen');
    const diaryScreen = document.getElementById('diary-screen');
    const datePicker = document.getElementById('diary-date');
    const diaryText = document.getElementById('diary-text');

    let usuarioAtual = null;

    datePicker.valueAsDate = new Date();

    auth.onAuthStateChanged((user) => {
        loadingScreen.style.display = 'none';
        
        if (user) {
            usuarioAtual = user;
            document.getElementById('user-name').innerText = "Olá, " + user.displayName.split(" ")[0];
            document.getElementById('user-photo').src = user.photoURL;
            
            loginScreen.style.display = 'none';
            diaryScreen.style.display = 'block';
            
            carregarTextoDoDia();
        } else {
            usuarioAtual = null;
            diaryScreen.style.display = 'none';
            loginScreen.style.display = 'block';
        }
    });

    function fazerLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch((error) => {
            mostrarModal('erro', 'Ops!', 'Não foi possível fazer o login.');
        });
    }

    function fazerLogout() {
        auth.signOut();
    }

    function carregarTextoDoDia() {
        if(!usuarioAtual) return;
        
        const dataSelecionada = datePicker.value; 
        diaryText.value = "Carregando memórias...";
        diaryText.disabled = true;

        db.ref('diarios/' + usuarioAtual.uid + '/' + dataSelecionada).once('value').then((snapshot) => {
            const textoSalvo = snapshot.val();
            diaryText.disabled = false;
            
            if(textoSalvo) {
                try {
                    // MÁGICA 1: Tenta descriptografar o texto do banco usando a chave do usuário
                    const bytes = CryptoJS.AES.decrypt(textoSalvo, usuarioAtual.uid);
                    const textoOriginal = bytes.toString(CryptoJS.enc.Utf8);
                    
                    if(textoOriginal) {
                        diaryText.value = textoOriginal; // É um texto criptografado válido
                    } else {
                        diaryText.value = textoSalvo; // É um texto antigo puro (que você digitou antes)
                    }
                } catch(e) {
                    diaryText.value = textoSalvo; // Cai aqui se for um texto antigo não criptografado
                }
            } else {
                diaryText.value = ""; 
            }
        }).catch((error) => {
            diaryText.disabled = false;
            diaryText.value = "";
            console.error("Erro ao carregar:", error);
        });
    }

    function salvarDiario() {
        if(!usuarioAtual) return;

        const btn = document.getElementById('btn-salvar');
        btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Trancando...";
        
        const dataSelecionada = datePicker.value;
        const textoParaSalvar = diaryText.value;

        // MÁGICA 2: Criptografa o texto antes de enviar para o banco
        const textoCriptografado = CryptoJS.AES.encrypt(textoParaSalvar, usuarioAtual.uid).toString();

        db.ref('diarios/' + usuarioAtual.uid + '/' + dataSelecionada).set(textoCriptografado).then(() => {
            setTimeout(() => {
                btn.innerHTML = "<i class='fa-solid fa-lock'></i> Salvar e Trancar Dia";
                mostrarModal('sucesso', 'Salvo com sucesso!', 'As suas memórias estão criptografadas e trancadas no cofre.');
            }, 600);
        }).catch((error) => {
            btn.innerHTML = "<i class='fa-solid fa-lock'></i> Salvar e Trancar Dia";
            mostrarModal('erro', 'Erro ao salvar', 'Verifique sua conexão e tente novamente.');
        });
    }

    function mostrarModal(tipo, titulo, mensagem) {
        const modal = document.getElementById('custom-modal');
        const icon = document.getElementById('modal-icon');
        const title = document.getElementById('modal-title');
        const text = document.getElementById('modal-text');

        title.innerText = titulo;
        text.innerText = mensagem;

        if (tipo === 'sucesso') {
            icon.className = "fa-solid fa-circle-check";
            icon.style.color = "#4CAF50"; 
        } else if (tipo === 'erro') {
            icon.className = "fa-solid fa-circle-xmark";
            icon.style.color = "#E27D60"; 
        }
        modal.style.display = 'flex';
    }

    function fecharModal() {
        document.getElementById('custom-modal').style.display = 'none';
    }
</script>

</body>
</html>
