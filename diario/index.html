<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Mundo 3D - Diário Inteligente</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/pt.js"></script>
    
    <style>
        :root {
            --primary-color: #4A2E1B; 
            --accent-color: #E27D60;  
            --bg-color: #f5efe6; /* Cor de fundo mais limpa, estilo mesa de madeira clara */
            --text-color: #333;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box;
        }
        
        .container { 
            max-width: 450px; width: 100%; background: white; padding: 25px 25px 15px 25px; 
            border-radius: 12px 20px 20px 12px; box-shadow: 10px 10px 25px rgba(0,0,0,0.06); 
            box-sizing: border-box; text-align: center; border-left: 18px solid var(--primary-color); position: relative;
        }

        .container::before {
            content: ''; position: absolute; top: 5%; bottom: 5%; left: -12px; width: 3px;
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 15px, rgba(255,255,255,0.3) 15px, rgba(255,255,255,0.3) 30px);
        }
        
        .logo { max-width: 110px; margin-bottom: 10px; }
        
        .diary-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f0e9e1; }
        .diary-header img { max-width: 70px; margin-bottom: 5px; }
        .diary-header h2 { font-family: 'Patrick Hand', cursive; color: #7a6353; margin: 0; font-size: 20px; letter-spacing: 0.5px; font-weight: normal; }

        h2 { color: var(--primary-color); margin-top: 0; margin-bottom: 5px; font-size: 26px; font-family: 'Patrick Hand', cursive; letter-spacing: 1px;}
        p { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        
        .btn-google {
            background-color: white; color: #444; border: 1px solid #ccc; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; 
            width: 100%; font-size: 16px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn-google:hover { background-color: #f9f9f9; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-google img { width: 20px; }

        button.btn-primary { 
            background-color: var(--primary-color); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; 
            width: 100%; font-size: 16px; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 10px;
        }
        button.btn-primary:hover { background-color: #311e12; }
        
        .btn-secondary { background-color: transparent; color: #888; border: none; font-size: 14px; padding: 5px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 6px; width: 100%;}
        .btn-secondary:hover { color: #d9534f; text-decoration: underline; }

        .user-profile {
            display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px dashed #eee;
        }
        .user-profile img { width: 40px; border-radius: 50%; border: 2px solid var(--accent-color); padding: 2px;}
        .user-profile div { text-align: left; }
        .user-profile span { display: block; color: var(--primary-color); font-size: 20px; font-family: 'Patrick Hand', cursive; letter-spacing: 1px; }
        .user-profile small { color: #aaa; font-size: 11px; }
        .user-profile small i { color: #ccc; }

        .date-navigation {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; width: 100%; gap: 5px;
        }
        .nav-arrow {
            background: none; border: none; font-size: 18px; color: #bbb; cursor: pointer; padding: 5px; transition: 0.3s; flex-shrink: 0;
        }
        .nav-arrow:hover { color: var(--accent-color); transform: scale(1.1); }
        
        .date-wrapper {
            display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; border-bottom: 2px solid var(--accent-color); padding-bottom: 2px; flex-grow: 1; min-width: 0; 
        }
        .date-wrapper i { color: #ccc; font-size: 15px; flex-shrink: 0; } 
        
        .date-picker {
            border: none; font-size: 17px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: var(--primary-color); font-weight: bold; background: transparent;
            outline: none; text-align: center; cursor: pointer; width: 100%; max-width: 210px; 
        }

        /* MUDANÇA: Folha Orgânica e Limpa */
        .paper-wrapper {
            perspective: 1200px; /* Prepara o ambiente para o 3D */
            margin-bottom: 15px;
        }

        .paper-container { 
            position: relative; 
            background-color: #fcf8f2; /* Creme muito suave, quase branco */
            /* O SEGREDO: Bordas levemente orgânicas/irregulares imitando corte de papel */
            border-radius: 2px 255px 3px 255px / 255px 5px 225px 3px; 
            box-shadow: 2px 3px 12px rgba(0,0,0,0.06); 
            border: 1px solid #ebdaca;
            transform-origin: left center; /* A folha vira a partir da lombada esquerda */
            will-change: transform;
        }

        textarea {
            width: 100%; height: 280px; padding: 30px 15px 15px 42px; font-size: 20px; font-family: 'Patrick Hand', cursive; 
            color: #2b2b2b; box-sizing: border-box; resize: none; outline: none; border: none; background: transparent;
            /* Linhas mais discretas */
            line-height: 30px; background-image: repeating-linear-gradient(transparent, transparent 29px, rgba(166, 138, 113, 0.25) 29px, rgba(166, 138, 113, 0.25) 30px); background-attachment: local;
        }
        .paper-container::before {
            /* Linha da margem clássica avermelhada */
            content: ''; position: absolute; top: 0; bottom: 0; left: 28px; width: 1px;
            background-color: rgba(217, 83, 79, 0.35); z-index: 1; pointer-events: none;
        }

        /* MUDANÇA: Animação Real de Livro (Vira na Lombada) */
        @keyframes pageTurnOut {
            0% { transform: rotateY(0deg); opacity: 1; }
            100% { transform: rotateY(-90deg); opacity: 0; }
        }
        @keyframes pageTurnIn {
            0% { transform: rotateY(90deg); opacity: 0; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        .flatpickr-calendar { font-family: 'Segoe UI', sans-serif !important; border-radius: 12px !important; box-shadow: 0 10px 30px rgba(0,0,0,0.1) !important; border: 1px solid #f0e9e1 !important; padding: 5px !important; background-color: #fff !important;}
        .flatpickr-day.selected { background: var(--primary-color) !important; border-color: var(--primary-color) !important; }
        .dia-com-registro { position: relative; font-weight: bold; }
        .dia-com-registro::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; border-radius: 50%; background-color: var(--accent-color); }

        .contact-section { margin-top: 15px; padding-top: 12px; border-top: 1px solid #eee; }
        .contact-section p { font-size: 12px; color: #888; margin-bottom: 10px; font-weight: 500;}
        .social-links { display: flex; flex-direction: row; gap: 8px; width: 100%; justify-content: center;}
        
        .btn-contact {
            color: white; border: none; padding: 10px 15px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 600; font-size: 13px; transition: 0.3s; flex: 1; max-width: 180px;
        }
        .btn-instagram { background-color: #c96549; } 
        .btn-whatsapp { background-color: #6d4f3b; } 
        .btn-contact:hover { opacity: 0.9; transform: translateY(-1px); }

        #loading-screen, #login-screen, #diary-screen { display: none; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-left-color: var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(3px); }
        .modal-content { background: white; padding: 25px; border-radius: 15px; text-align: center; max-width: 290px; width: 80%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: popIn 0.3s ease-out; }
        .modal-content i { font-size: 40px; margin-bottom: 12px; }
        .modal-content h3 { margin: 0 0 8px; color: #333; font-size: 18px; }
        .modal-content p { color: #666; font-size: 13px; margin-bottom: 15px; line-height: 1.4;}
        .modal-content button { background-color: var(--primary-color); color: white; border: none; padding: 10px 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-screen" style="display: block; padding: 40px 0;">
        <div class="spinner"></div>
        <span style="color: var(--primary-color); font-weight: bold;">Abrindo o cadeado...</span>
    </div>

    <div id="login-screen">
        <img src="logo.jpg" alt="Mini Mundo" class="logo" onerror="this.src='https://via.placeholder.com/120?text=Mini+Mundo'">
        <h2>O Seu Refúgio Secreto</h2>
        <p>Encoste o chaveiro, faça login e guarde suas memórias. Somente você tem a chave.</p>
        
        <button class="btn-google" onclick="fazerLogin()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
            Destrancar com o Google
        </button>
    </div>

    <div id="diary-screen">
        <div class="diary-header">
            <img src="logo.jpg" alt="Mini Mundo">
            <h2>Seu Espaço de Memórias</h2>
        </div>

        <div class="user-profile">
            <img id="user-photo" src="" alt="Foto de Perfil">
            <div>
                <span id="user-name">Carregando...</span>
                <small><i class="fa-solid fa-lock"></i> Dados criptografados e seguros</small>
            </div>
        </div>
        
        <div class="date-navigation">
            <button class="nav-arrow" onclick="mudarDataComAnimacao(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="date-wrapper">
                <i class="fa-regular fa-calendar-days"></i>
                <input type="text" id="diary-date" class="date-picker">
            </div>
            <button class="nav-arrow" onclick="mudarDataComAnimacao(1)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        
        <div class="paper-wrapper">
            <div class="paper-container" id="meu-caderno">
                <textarea id="diary-text" placeholder="Querido diário, hoje aconteceu algo incrível..."></textarea>
            </div>
        </div>
        
        <button class="btn-primary" id="btn-salvar" onclick="salvarDiario()">
            <i class="fa-solid fa-feather-pointed"></i> Guardar Memória
        </button>
        
        <button class="btn-secondary" onclick="fazerLogout()">
            <i class="fa-solid fa-book-open"></i> Fechar Caderno
        </button>
        
        <div class="contact-section">
            <p>Mais segredos e produtos inteligentes da Mini Mundo:</p>
            <div class="social-links">
                <a href="https://www.instagram.com/minimundo3d.oficial?igsh=M2g0ZzlraDRuM2Z3" target="_blank" class="btn-contact btn-instagram">
                    <i class="fa-brands fa-instagram"></i> Instagram
                </a>
                <a href="https://wa.me/5511992279009?text=Ol%C3%A1%21%20Achei%20incr%C3%ADvel%20o%20di%C3%A1rio%20inteligente%20e%20gostaria%20de%20saber%20mais." target="_blank" class="btn-contact btn-whatsapp">
                    <i class="fa-brands fa-whatsapp"></i> WhatsApp
                </a>
            </div>
        </div>
    </div>

</div>

<div id="custom-modal">
    <div class="modal-content">
        <i id="modal-icon" class="fa-solid fa-circle-check"></i>
        <h3 id="modal-title">Tudo Certo!</h3>
        <p id="modal-text">Mensagem aqui</p>
        <button id="modal-btn" onclick="fecharModal()">OK</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDs5CcY66RU5ymMHQGhI58g1aVcyn7MeAw",
      authDomain: "minimundo-diario.firebaseapp.com",
      databaseURL: "https://minimundo-diario-default-rtdb.firebaseio.com",
      projectId: "minimundo-diario",
      storageBucket: "minimundo-diario.firebasestorage.app",
      messagingSenderId: "336220925130",
      appId: "1:336220925130:web:d846cc4be80e0f7a53d833"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const loadingScreen = document.getElementById('loading-screen');
    const loginScreen = document.getElementById('login-screen');
    const diaryScreen = document.getElementById('diary-screen');
    const diaryText = document.getElementById('diary-text');
    const caderno = document.getElementById('meu-caderno');

    let usuarioAtual = null;
    let fpInstance = null; 
    let datasComRegistro = []; 
    let dataAnteriorGlobal = new Date(); 
    let isAnimating = false; // Trava de segurança para não bugar clicando rápido

    auth.onAuthStateChanged((user) => {
        loadingScreen.style.display = 'none';
        if (user) {
            usuarioAtual = user;
            const primeiroNome = user.displayName.split(" ")[0];
            document.getElementById('user-name').innerText = "Diário de " + primeiroNome;
            document.getElementById('user-photo').src = user.photoURL;
            loginScreen.style.display = 'none';
            diaryScreen.style.display = 'block';
            buscarDiasMapeados();
        } else {
            usuarioAtual = null;
            diaryScreen.style.display = 'none';
            loginScreen.style.display = 'block';
        }
    });

    function inicializarCalendario() {
        if(fpInstance) fpInstance.destroy(); 
        fpInstance = flatpickr("#diary-date", {
            locale: "pt", dateFormat: "Y-m-d", altInput: true, altFormat: "d \\de F \\de Y", defaultDate: "today", disableMobile: true,
            onChange: function(selectedDates, dateStr, instance) {
                if (!selectedDates[0] || !usuarioAtual || isAnimating) return;
                const novaData = selectedDates[0];
                let direcao = novaData.getTime() > dataAnteriorGlobal.getTime() ? 1 : -1;
                
                if(novaData.getTime() !== dataAnteriorGlobal.getTime()){
                    executarAnimacaoLivro(dateStr, direcao);
                    dataAnteriorGlobal = new Date(novaData);
                }
            },
            onDayCreate: function(dObj, dStr, fp, dayElem) {
                const dataFormatada = dayElem.dateObj.getFullYear() + "-" + String(dayElem.dateObj.getMonth() + 1).padStart(2, '0') + "-" + String(dayElem.dateObj.getDate()).padStart(2, '0');
                if (datasComRegistro.includes(dataFormatada)) dayElem.classList.add("dia-com-registro"); 
            }
        });
        dataAnteriorGlobal = new Date(); 
        carregarTextoDoDia(fpInstance.input.value);
    }

    function mudarDataComAnimacao(direcao) {
        if(!fpInstance || !usuarioAtual || isAnimating) return;
        const dataAtual = fpInstance.selectedDates[0];
        const novaData = new Date(dataAtual);
        novaData.setDate(novaData.getDate() + direcao);
        
        fpInstance.setDate(novaData, false); 
        const dataStr = fpInstance.input.value;
        dataAnteriorGlobal = new Date(novaData); 
        
        executarAnimacaoLivro(dataStr, direcao);
    }

    // MUDANÇA: Lógica blindada contra tela branca (Remove as propriedades no fim)
    function executarAnimacaoLivro(dataStr, direcao) {
        isAnimating = true;
        
        // 1. A página atual vira para a esquerda e some
        caderno.style.animation = 'none';
        void caderno.offsetWidth; 
        caderno.style.animation = "pageTurnOut 0.25s ease-in forwards";

        setTimeout(() => { 
            // 2. Troca o texto enquanto está invisível
            carregarTextoDoDia(dataStr); 
            
            // 3. A página nova vem da direita e pousa
            caderno.style.animation = "pageTurnIn 0.25s ease-out forwards";
            
            setTimeout(() => {
                // 4. O SEGREDO: Limpa o CSS da animação para não bugar o teclado no celular!
                caderno.style.animation = 'none';
                isAnimating = false;
            }, 250);

        }, 250);
    }

    function buscarDiasMapeados() {
        if(!usuarioAtual) return;
        db.ref('diarios/' + usuarioAtual.uid).on('value', (snapshot) => {
            datasComRegistro = snapshot.exists() ? Object.keys(snapshot.val()) : [];
            if(fpInstance) fpInstance.redraw(); else inicializarCalendario();
        });
    }

    function fazerLogin() {
        loadingScreen.style.display = 'block'; loginScreen.style.display = 'none';
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch((error) => {
            loadingScreen.style.display = 'none'; loginScreen.style.display = 'block';
            mostrarModal('erro', 'Ops!', 'Não foi possível destrancar o diário.');
        });
    }

    function fazerLogout() { auth.signOut(); }

    function carregarTextoDoDia(dataSelecionada) {
        if(!usuarioAtual || !dataSelecionada) return;
        diaryText.disabled = true;
        db.ref('diarios/' + usuarioAtual.uid + '/' + dataSelecionada).once('value').then((snapshot) => {
            const textoSalvo = snapshot.val();
            diaryText.disabled = false;
            if(textoSalvo) {
                try {
                    const bytes = CryptoJS.AES.decrypt(textoSalvo, usuarioAtual.uid);
                    diaryText.value = bytes.toString(CryptoJS.enc.Utf8) || textoSalvo; 
                } catch(e) { diaryText.value = textoSalvo; }
            } else { diaryText.value = ""; }
        }).catch((error) => {
            diaryText.disabled = false; diaryText.value = ""; 
        });
    }

    function salvarDiario() {
        if(!usuarioAtual || !fpInstance) return;
        const btn = document.getElementById('btn-salvar');
        btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Guardando...";
        const dataSelecionada = fpInstance.input.value;
        const textoParaSalvar = diaryText.value;
        const textoCriptografado = CryptoJS.AES.encrypt(textoParaSalvar, usuarioAtual.uid).toString();
        db.ref('diarios/' + usuarioAtual.uid + '/' + dataSelecionada).set(textoCriptografado).then(() => {
            setTimeout(() => {
                btn.innerHTML = "<i class='fa-solid fa-feather-pointed'></i> Guardar Memória";
                mostrarModal('sucesso', 'Memória Guardada!', 'Página criptografada e salva no cofre.');
            }, 500);
        }).catch((error) => {
            btn.innerHTML = "<i class='fa-solid fa-feather-pointed'></i> Guardar Memória";
            mostrarModal('erro', 'Ops', 'Verifique a conexão e tente salvar novamente.');
        });
    }

    function mostrarModal(tipo, titulo, mensagem) {
        const modal = document.getElementById('custom-modal');
        const icon = document.getElementById('modal-icon');
        const title = document.getElementById('modal-title');
        const text = document.getElementById('modal-text');
        title.innerText = titulo; text.innerText = mensagem;
        icon.className = tipo === 'sucesso' ? "fa-solid fa-circle-check" : "fa-solid fa-circle-xmark";
        icon.style.color = tipo === 'sucesso' ? "#4CAF50" : "#E27D60"; 
        modal.style.display = 'flex';
    }
    function fecharModal() { document.getElementById('custom-modal').style.display = 'none'; }
</script>

</body>
</html>
