<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Mini Mundo Automático</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap');
        body { font-family: 'Inter', sans-serif; background: #eef2f5; padding: 20px; display: flex; justify-content: center; }
        .admin-box { background: white; width: 100%; max-width: 650px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #111; font-size: 1.6rem; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px;}
        
        .section-title { font-size: 1rem; color: #444; font-weight: 800; margin-top: 25px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;}
        label { font-weight: 600; color: #555; display: block; margin-top: 10px; margin-bottom: 5px; font-size: 0.85rem;}
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 1rem; box-sizing: border-box; background: #fafafa;}
        select:focus, input:focus { border-color: #0056b3; outline: none; background: #fff;}
        
        .row { display: flex; gap: 15px; align-items: flex-end;}
        .col { flex: 1; }

        .btn { width: 100%; border: none; padding: 14px; border-radius: 8px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px;}
        .btn:active { transform: scale(0.98); }
        .btn-magic { background: linear-gradient(45deg, #6a11cb, #2575fc); color: white; margin-top: 20px; box-shadow: 0 4px 15px rgba(37, 117, 252, 0.3);}
        .btn-magic:hover { opacity: 0.9; }
        .btn-magic:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; color: #666;}

        /* Terminal de Logs do Hackerman */
        .log-container { background: #1e1e1e; border-radius: 8px; padding: 15px; margin-top: 20px; height: 200px; overflow-y: auto; font-family: 'Fira Code', monospace; font-size: 0.8rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);}
        .log-line { margin: 4px 0; border-bottom: 1px dashed #333; padding-bottom: 4px;}
        .log-time { color: #888; margin-right: 8px; }
        .log-info { color: #00ff00; }
        .log-warn { color: #ffcc00; }
        .log-error { color: #ff3333; }
        .log-success { color: #00ffff; font-weight: bold;}
    </style>
</head>
<body>

<div class="admin-box">
    <h1>🚀 Automação Total IA - Mini Mundo</h1>
    
    <div class="section-title">🔐 1. Conexão com o Cérebro (Gemini API)</div>
    <label for="api-key">Sua Chave Privada do Google AI Studio:</label>
    <input type="password" id="api-key" placeholder="Cole sua chave AI_zaxy... aqui" onchange="salvarChave()">
    <p style="font-size: 0.7rem; color: #888; margin-top: 5px;">Fica salva apenas no seu navegador para segurança.</p>

    <hr style="border: 0; border-top: 1px dashed #ddd; margin: 20px 0;">

    <div class="section-title">⚙️ 2. Configurar Produção</div>
    <div class="row">
        <div class="col" style="flex: 2;">
            <label for="time">Time Alvo:</label>
            <select id="time">
                <option value="https://script.google.com/macros/s/AKfycbwbB1LkCbpT5ofgWXB0tGlpbMopMnjWeLfEOX4IbEEcrrvMJboZ3C5SZ9LVSaVyD8fiiQ/exec" data-nome="Corinthians">🦅 Corinthians</option>
                <option value="https://script.google.com/macros/s/AKfycbxdeaVayrVv13eN044gzREOIT4__9rnbBjm0cx6JMOIfgp0eCihqcTl8wOH4PTPs34G-A/exec" data-nome="São Paulo">🔴 São Paulo</option>
                <option value="https://script.google.com/macros/s/AKfycbwEjviHWdcxWVFc6hDAhyNE0JCH41J_DzDnUvIAlXosqihM83n1nRfe-WZUWUZs9nOb/exec" data-nome="Palmeiras">🐷 Palmeiras</option>
                <option value="https://script.google.com/macros/s/AKfycbxiHVwdciFEW8ro_JqBokolGgSm-Vh1ILi2aB7gu9VKs4YcVnQBCEDa7QnqOPXuRlb3pQ/exec" data-nome="Santos">🐳 Santos</option>
                <option value="https://script.google.com/macros/s/AKfycbxq7xV9ZI63_vBAUwDFrm_3j28D_GCsswGZbHmiTeE-saN7MwuR58zFE5JkTiK_5YkAZQ/exec" data-nome="Flamengo">🔴 Flamengo</option>
            </select>
        </div>
        <div class="col">
            <label for="qtd">Quantidade:</label>
            <input type="number" id="qtd" value="5" min="1" max="15">
        </div>
    </div>

    <button id="btn-iniciar" class="btn btn-magic" onclick="iniciarAutomacao()">✨ Gerar e Enviar Sozinho</button>

    <div class="section-title">📟 3. Terminal de Operações</div>
    <div class="log-container" id="terminal">
        <div class="log-line"><span class="log-time">[Sistema]</span><span class="log-info">Aguardando ordens do mestre Fernando...</span></div>
    </div>
</div>

<script>
    // Carrega a chave se já estiver salva no navegador
    window.onload = () => {
        const chaveSalva = localStorage.getItem("gemini_api_key");
        if(chaveSalva) document.getElementById("api-key").value = chaveSalva;
    };

    function salvarChave() {
        localStorage.setItem("gemini_api_key", document.getElementById("api-key").value);
    }

    function addLog(mensagem, tipo = 'info') {
        const terminal = document.getElementById("terminal");
        const hora = new Date().toLocaleTimeString('pt-BR');
        terminal.innerHTML += `<div class="log-line"><span class="log-time">[${hora}]</span><span class="log-${tipo}">${mensagem}</span></div>`;
        terminal.scrollTop = terminal.scrollHeight; // Rola pro final
    }

    async function chamarIA(timeNome, qtd, apiKey) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        
        const prompt = `Atue como um especialista em futebol e na história dos clubes. Gere ${qtd} perguntas difíceis e criativas de múltipla escolha sobre o ${timeNome}.
Regras ESTRITAS de formatação (Siga exatamente assim para cada pergunta, com uma linha em branco separando os blocos):

Pergunta: [Escreva a pergunta]
A) [Opção 1]
B) [Opção 2]
C) [Opção 3]
D) [Opção 4]
Correta: [Apenas o número 1, 2, 3 ou 4]

NÃO escreva introdução, NÃO escreva conclusão, NÃO use negrito, entregue apenas o texto puro pedido acima.`;

        const payload = {
            contents: [{ parts: [{ text: prompt }] }]
        };

        const resposta = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!resposta.ok) {
            throw new Error(`A API da IA rejeitou a chave ou deu erro (${resposta.status}).`);
        }

        const dados = await resposta.json();
        return dados.candidates[0].content.parts[0].text;
    }

    function extrairPerguntas(textoIA) {
        const perguntas = [];
        const blocos = textoIA.split(/(?:Pergunta|Q):/i).filter(b => b.trim().length > 0);

        blocos.forEach(bloco => {
            const linhas = bloco.trim().split('\n').map(l => l.trim()).filter(l => l !== '');
            if (linhas.length >= 5) { 
                const pergunta = linhas[0];
                const op1 = linhas[1].replace(/^[A-D1-4][\)\.-]?\s*/i, '').trim();
                const op2 = linhas[2].replace(/^[A-D1-4][\)\.-]?\s*/i, '').trim();
                const op3 = linhas[3].replace(/^[A-D1-4][\)\.-]?\s*/i, '').trim();
                const op4 = linhas[4].replace(/^[A-D1-4][\)\.-]?\s*/i, '').trim();
                
                const linhaCorreta = linhas.find(l => /Correta/i.test(l));
                let correta = 1;
                
                if (linhaCorreta) {
                    const match = linhaCorreta.match(/\d+/);
                    if (match) correta = parseInt(match[0]);
                } else if (linhas[5]) { 
                    const match = linhas[5].match(/\d+/);
                    if (match) correta = parseInt(match[0]);
                }

                if (pergunta && op1 && op2 && op3 && op4) {
                    perguntas.push({ pergunta, opcoes: [op1, op2, op3, op4], correta });
                }
            }
        });
        return perguntas;
    }

    async function enviarParaPlanilha(urlPlanilha, perguntas) {
        const resposta = await fetch(urlPlanilha, {
            method: "POST",
            body: JSON.stringify({ acao: "salvar_quiz", perguntas: perguntas })
        });
        return await resposta.json();
    }

    async function iniciarAutomacao() {
        const apiKey = document.getElementById("api-key").value.trim();
        if(!apiKey) return addLog("ERRO CRÍTICO: Chave da IA não informada!", "error");

        const select = document.getElementById("time");
        const timeUrl = select.value;
        const timeNome = select.options[select.selectedIndex].getAttribute("data-nome");
        const qtd = document.getElementById("qtd").value;
        const btn = document.getElementById("btn-iniciar");

        btn.disabled = true;
        btn.innerHTML = "⏳ Trabalhando duro...";

        try {
            addLog(`--- INICIANDO PROTOCOLO ${timeNome.toUpperCase()} ---`, "warn");
            
            addLog(`Solicitando ${qtd} perguntas para a Inteligência Artificial...`, "info");
            const respostaIA = await chamarIA(timeNome, qtd, apiKey);
            addLog("Resposta recebida. Mente artificial funcionou.", "success");
            
            addLog("Limpando e formatando os dados...", "info");
            const perguntasFormatadas = extrairPerguntas(respostaIA);
            
            if(perguntasFormatadas.length === 0) {
                throw new Error("A IA gerou um texto fora do padrão. Impossível extrair.");
            }
            addLog(`${perguntasFormatadas.length} perguntas validadas com sucesso.`, "success");

            addLog("Abrindo túnel de dados com a Planilha do Google...", "info");
            const resultadoPlanilha = await enviarParaPlanilha(timeUrl, perguntasFormatadas);

            if(resultadoPlanilha.sucesso) {
                addLog(`DADOS INJETADOS COM SUCESSO!`, "success");
                addLog(`Resumo: ${resultadoPlanilha.adicionadas} Novas | ${resultadoPlanilha.repetidas} Repetidas ignoradas.`, "success");
                addLog("O Aplicativo do Chaveiro já está atualizado no ar.", "info");
            } else {
                throw new Error(resultadoPlanilha.erro);
            }

        } catch (erro) {
            addLog(`FALHA NA OPERAÇÃO: ${erro.message}`, "error");
        } finally {
            btn.disabled = false;
            btn.innerHTML = "✨ Gerar e Enviar Sozinho";
            addLog("--- PROTOCOLO FINALIZADO ---", "warn");
        }
    }
</script>

</body>
</html>
