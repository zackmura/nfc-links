<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lembrança Interativa - Mini Mundo 3D</title>
    
    <style>
        /* --- CSS EMBUTIDO --- */
        :root {
            --marrom-mini: #4A3320; 
            --fundo: #F5F2EB;
            --verde-insta: #5C8D89; 
        }

        body {
            background-color: var(--fundo);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--marrom-mini);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 400px; 
            width: 100%;
            padding: 15px 20px 30px; 
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 90%;
            max-width: 250px;
            margin-bottom: 15px; 
        }

        .burst-wrapper {
            position: relative;
            margin: 0 auto 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .burst-wrapper::before,
        .burst-wrapper::after {
            content: "";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 200px; 
            height: 200px;
            background-image: url('Logo_fundo.png'); 
            background-size: contain; 
            background-position: center; 
            background-repeat: no-repeat;
            z-index: 0; 
            opacity: 0.6; 
            filter: blur(3px); 
        }

        .burst-wrapper::before { left: -15px; }
        .burst-wrapper::after { right: -15px; }

        .media-container {
            width: 220px;
            height: 220px;
            border-radius: 50%; 
            overflow: hidden;
            border: 5px solid white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            background-color: #ddd; 
            position: relative; 
            z-index: 2; 
        }

        .foto-destaque, #video-cliente {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: none; 
        }

        .loader-animacao {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e0e0e0, #f5f5f5);
            animation: pulse 1.5s infinite alternate;
            color: var(--marrom-mini);
            font-weight: bold;
            font-size: 14px;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        h1 {
            font-size: 26px;
            margin: 10px 0;
            color: var(--marrom-mini);
        }

        .mensagem {
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 15px; 
            padding: 0 15px;
        }

        .contador-container {
            display: none; 
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .tempo-box {
            background-color: white;
            border: 2px solid var(--verde-insta);
            border-radius: 8px;
            padding: 8px 10px;
            min-width: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .tempo-box span {
            display: block;
            font-size: 20px;
            font-weight: 900;
            color: var(--marrom-mini);
        }
        
        .tempo-box p {
            margin: 0;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--verde-insta);
            margin-top: 2px;
        }

        .imagem-produto {
            width: 100%;
            max-width: 110px; 
            margin: 0 auto 20px;
            display: block;
            border-radius: 8px;
            transform: perspective(600px) rotateX(25deg) rotateY(-35deg) rotateZ(5deg);
            filter: drop-shadow(-12px 18px 15px rgba(0,0,0,0.4)); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }

        .marketing-card {
            background-color: #E8E3D8;
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            text-align: left;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .marketing-card p {
            margin: 0;
            font-size: 13px;
            width: 75%;
        }

        .nfc-icon {
            font-weight: 800;
            font-size: 24px;
            color: var(--marrom-mini);
            opacity: 0.7;
        }

        .btn-instagram {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--verde-insta);
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }

        .btn-instagram:active {
            transform: scale(0.98);
        }

        .icon-social {
            width: 32px;
            height: 32px;
            margin-right: 12px;
        }

        .btn-text {
            text-align: left;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Logo_titulo.png" alt="Mini Mundo Impressão 3D & Design" class="logo">

        <div class="burst-wrapper">
            <div class="media-container">
                <div id="loader-visual" class="loader-animacao">Preparando surpresa...</div>
                <img id="foto-cliente" src="" alt="Foto da Lembrança" class="foto-destaque">
                <iframe id="video-cliente" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <h1 id="nomes-cliente">Só um instante...</h1>
        <p id="mensagem-cliente" class="mensagem">Acessando a sua lembrança exclusiva da Mini Mundo 3D.</p>

        <div id="contador-regressivo" class="contador-container">
            <div class="tempo-box"><span id="dias">00</span><p>Dias</p></div>
            <div class="tempo-box"><span id="horas">00</span><p>Horas</p></div>
            <div class="tempo-box"><span id="minutos">00</span><p>Min</p></div>
            <div class="tempo-box"><span id="segundos">00</span><p>Seg</p></div>
        </div>

        <img src="produto_ima.png" alt="Lembrança NFC Mini Mundo" class="imagem-produto">

        <div class="marketing-card">
            <p>Sua lembrança personalizada com <strong>NFC</strong> e <strong>impressão 3D</strong> de alta precisão.</p>
            <div class="nfc-icon">N)))</div>
        </div>

        <a href="https://instagram.com/minimundo3d.oficial" target="_blank" class="btn-instagram">
            <img src="icon_insta.png" alt="Instagram" class="icon-social">
            <div class="btn-text">
                Siga-nos no Instagram: <br><strong>@minimundo3d.oficial</strong>
            </div>
        </a>
    </div>  
    
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const clienteId = urlParams.get('id');

            const tituloEl = document.getElementById("nomes-cliente");
            const mensagemEl = document.getElementById("mensagem-cliente");
            const fotoEl = document.getElementById("foto-cliente");
            const videoEl = document.getElementById("video-cliente");
            const loaderEl = document.getElementById("loader-visual");
            const contadorEl = document.getElementById("contador-regressivo");

            if (!clienteId) {
                tituloEl.innerText = "Aproxime seu celular!";
                mensagemEl.innerText = "Para ver a surpresa, encoste o celular no ímã NFC da Mini Mundo 3D.";
                loaderEl.innerText = "Aguardando NFC...";
                return;
            }

            // Sua URL da API mantida
            const webAppUrl = "https://script.google.com/macros/s/AKfycbxaubKWb7f9DiIlR8WLryYv8UClrCIbaSM4biGwgkwxUnDFGHsCsL7JQrLEGEZNwRvtdg/exec"; 
            
            try {
                const resposta = await fetch(`${webAppUrl}?id=${clienteId}`);
                const dadosCliente = await resposta.json();

                if (dadosCliente.erro) {
                    tituloEl.innerText = "Ops, não encontrado.";
                    mensagemEl.innerText = "Verifique se a etiqueta NFC foi gravada corretamente.";
                    loaderEl.innerText = "Erro";
                    return;
                }

                tituloEl.innerText = dadosCliente.nomes;
                loaderEl.style.display = "none"; 

                if (dadosCliente.fase === "teaser") {
                    fotoEl.src = dadosCliente.foto; 
                    fotoEl.style.display = "block";
                    
                    // LÓGICA NOVA: Pegar a data da planilha e formatar
                    // Se não tiver data na planilha, cai num valor padrão de segurança
                    const dataString = dadosCliente.dataLiberacao || "2026-12-31T00:00:00";
                    const dataAlvo = new Date(dataString);
                    
                    // Formata a data para exibir bonito (Ex: 13/04/2026)
                    const dia = String(dataAlvo.getDate()).padStart(2, '0');
                    const mes = String(dataAlvo.getMonth() + 1).padStart(2, '0');
                    const ano = dataAlvo.getFullYear();
                    const dataFormatada = `${dia}/${mes}/${ano}`;

                    mensagemEl.innerHTML = `Uma surpresa muito especial já tem data marcada! No dia <strong>${dataFormatada}</strong>, um vídeo incrível será revelado. Fique de olho na contagem regressiva:`;
                    mensagemEl.style.display = "block";
                    contadorEl.style.display = "flex";

                    const timestampAlvo = dataAlvo.getTime();

                    // Contador rodando
                    setInterval(function() {
                        const agora = new Date().getTime();
                        const diferenca = timestampAlvo - agora;

                        if (diferenca > 0) {
                            const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
                            const horas = Math.floor((diferenca % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            const minutos = Math.floor((diferenca % (1000 * 60 * 60)) / (1000 * 60));
                            const segundos = Math.floor((diferenca % (1000 * 60)) / 1000);

                            document.getElementById("dias").innerText = String(dias).padStart(2, '0');
                            document.getElementById("horas").innerText = String(horas).padStart(2, '0');
                            document.getElementById("minutos").innerText = String(minutos).padStart(2, '0');
                            document.getElementById("segundos").innerText = String(segundos).padStart(2, '0');
                        } else {
                            contadorEl.innerHTML = "<p class='mensagem' style='font-weight: bold; color: var(--verde-insta);'>A qualquer momento a surpresa será liberada!</p>";
                        }
                    }, 1000);

                } else if (dadosCliente.fase === "video") {
                    videoEl.src = dadosCliente.linkVideoYoutube;
                    videoEl.style.display = "block";
                    mensagemEl.style.display = "none";
                    contadorEl.style.display = "none"; 
                }
            } catch (erro) {
                console.error("Erro na integração:", erro);
                tituloEl.innerText = "Erro de conexão.";
                mensagemEl.innerText = "Não conseguimos carregar os dados agora.";
                loaderEl.innerText = "Erro";
            }
        });
    </script>
</body>
</html>
