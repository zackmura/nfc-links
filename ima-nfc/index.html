<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lembrança Interativa - Mini Mundo 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="logo_titulo.png" alt="Mini Mundo Impressão 3D & Design" class="logo">

        <div class="burst-wrapper">
            <div class="media-container">
                <img id="foto-cliente" src="" alt="Foto" class="foto-destaque">
                <iframe id="video-cliente" src="" frameborder="0" allowfullscreen style="display: none;"></iframe>
            </div>
        </div>

        <h1 id="nomes-cliente">Carregando...</h1>
        <p id="mensagem-cliente" class="mensagem"></p>

        <img src="produto_ima.png" alt="Lembrança NFC Mini Mundo" class="imagem-produto">

        <div class="marketing-card">
            <p>Sua lembrança personalizada com <strong>NFC</strong> e <strong>impressão 3D</strong> de alta precisão.</p>
            <div class="nfc-icon">N)))</div>
        </div>

        <a href="https://instagram.com/minimundo3d.oficial" target="_blank" class="btn-instagram">
            <img src="icon_insta.png" alt="Instagram" class="icon-social">
            <div class="btn-text">
                Siga-nos no Instagram: <br><strong>@minimundo3d.oficial</strong>
            </div>
        </a>
    </div>  
    <script src="app.js"></script>
</body>
</html>
