<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Palmeiras</title>
</head>
<body>

<h1>⚽ Palmeiras</h1>

<h2>Últimos Jogos</h2>
<div id="jogos"></div>

<script>

const apiKey = "d232ddb528msh218d515e9566e6cp1794e6jsn8fbcfd203787";

// URL atualizada para a nova API que você assinou
fetch("https://free-api-live-football-data.p.rapidapi.com/football-get-all-list-league", {
	method: "GET",
	headers: {
		"x-rapidapi-key": apiKey,
		"x-rapidapi-host": "free-api-live-football-data.p.rapidapi.com"
	}
})
.then(response => {
    if (!response.ok) throw new Error("Erro: " + response.status);
    return response.json();
})
.then(data => {
    console.log(data); // Para você ver a estrutura no console
    
    let html = "";
    // Note que a estrutura de dados (data.response) pode mudar entre APIs
    // Esta API específica retorna as ligas em 'data.response.leagues' ou similar
    if(data.response && data.response.list) {
        data.response.list.slice(0, 5).forEach(item => {
            html += `<p>🏆 ${item.name}</p>`;
        });
    }

    document.getElementById("jogos").innerHTML = html || "Dados carregados com sucesso!";
})
.catch(err => {
    console.error(err);
    document.getElementById("jogos").innerHTML = "Erro ao acessar a nova API.";
});
</script>
</body>
</html>
