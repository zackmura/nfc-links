<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Palmeiras</title>
</head>

<body>

<h1>⚽ Palmeiras</h1>

<h2>Últimos Jogos</h2>
<div id="jogos">Carregando...</div>

<script>

fetch("https://api.allorigins.win/raw?url=https://www.sofascore.com/api/v1/team/1963/events/last/5")
.then(response => response.json())
.then(data => {

	let html = "";

	data.events.forEach(jogo => {

		let casa = jogo.homeTeam.name;
		let fora = jogo.awayTeam.name;

		let golsCasa = jogo.homeScore.current;
		let golsFora = jogo.awayScore.current;

		html += `<p>${casa} ${golsCasa} x ${golsFora} ${fora}</p>`;

	});

	document.getElementById("jogos").innerHTML = html;

})
.catch(error => {

	document.getElementById("jogos").innerHTML =
	"Erro ao carregar jogos.";

	console.error(error);

});

</script>

</body>
</html>
