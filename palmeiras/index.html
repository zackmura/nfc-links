<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Palmeiras</title>
</head>

<body>

<h1>⚽ Palmeiras</h1>

<h2>Últimos Jogos</h2>
<div id="jogos">Carregando...</div>

<script>

fetch("https://www.scorebat.com/video-api/v3/")
.then(response => response.json())
.then(data => {

	let html = "";

	data.response.slice(0,5).forEach(jogo => {

		let time = jogo.title;

		html += `<p>${time}</p>`;

	});

	document.getElementById("jogos").innerHTML = html;

})
.catch(error => {

	document.getElementById("jogos").innerHTML =
	"Erro ao carregar jogos.";

	console.error(error);

});

</script>

</body>
</html>
