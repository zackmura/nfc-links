<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmeiras - Resultados</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #006400; margin-bottom: 5px; }
        .jogo { border-bottom: 1px solid #eee; padding: 15px 0; }
        .placar { font-weight: bold; font-size: 1.1em; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 0.75em; color: #666; margin-bottom: 5px; }
        .destaque { color: #006400; font-weight: bold; border: 1px solid #006400; border-radius: 5px; padding: 2px 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚽ Palmeiras</h1>
        <p>Jogos Encontrados Hoje</p>
        <hr>
        <div id="jogos">Buscando partidas...</div>
    </div>

    <script>
        const apiKey = "d232ddb528msh218d515e9566e6cp1794e6jsn8fbcfd203787";
        
        // Pegando a data de hoje no formato AAAAMMDD que a API costuma pedir
        const hoje = new Date().toISOString().slice(0, 10).replace(/-/g, "");
        
        // Usando o endpoint que aparece na sua imagem: Get Matches/Events by Date
        const url = `https://free-api-live-football-data.p.rapidapi.com/football-get-matches-by-date?date=${hoje}`;

        fetch(url, {
            method: "GET",
            headers: {
                "x-rapidapi-key": apiKey,
                "x-rapidapi-host": "free-api-live-football-data.p.rapidapi.com"
            }
        })
        .then(response => {
            if (!response.ok) throw new Error("Erro na API: " + response.status);
            return response.json();
        })
        .then(data => {
            const container = document.getElementById("jogos");
            const partidas = data.response?.matches || [];
            
            // Filtramos apenas as partidas do Palmeiras
            const jogosPalmeiras = partidas.filter(j => 
                j.home_team.name.includes("Palmeiras") || j.away_team.name.includes("Palmeiras")
            );

            if (jogosPalmeiras.length === 0) {
                container.innerHTML = "Não há jogos do Palmeiras para a data de hoje.";
                return;
            }

            let html = "";
            jogosPalmeiras.forEach(j => {
                const home = j.home_team.name;
                const away = j.away_team.name;
                const scoreHome = j.home_score?.current ?? "-";
                const scoreAway = j.away_score?.current ?? "-";

                html += `
                    <div class="jogo">
                        <div class="status">${j.status?.type || 'Partida'}</div>
                        <div class="placar">
                            <span class="${home.includes('Palmeiras') ? 'destaque' : ''}">${home}</span>
                            <span>${scoreHome} x ${scoreAway}</span>
                            <span class="${away.includes('Palmeiras') ? 'destaque' : ''}">${away}</span>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        })
        .catch(err => {
            console.error(err);
            document.getElementById("jogos").innerHTML = "Erro ao carregar. Verifique a aba 'Livescores' no RapidAPI.";
        });
    </script>
</body>
</html>
