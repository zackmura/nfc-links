<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaveiro Interativo - Mini Mundo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; }
        .widget { max-width: 400px; margin: auto; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .header { background: #054f2a; color: white; padding: 20px; text-align: center; }
        .team-title { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; }
        .section { padding: 10px 15px; font-size: 0.8rem; background: #f8f9fa; color: #666; font-weight: bold; border-top: 1px solid #eee; }
        .match { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f1f1f1; }
        .t-name { flex: 1; font-size: 0.85rem; }
        .score-area { width: 80px; text-align: center; }
        .score { font-size: 1.1rem; font-weight: 900; color: #222; }
        .m-date { font-size: 0.65rem; color: #999; margin-top: 4px; display: block; }
    </style>
</head>
<body>

<div class="widget">
    <div class="header">
        <div class="team-title" id="nome-time">Carregando...</div>
    </div>
    
    <div class="section">Últimos Resultados</div>
    <div id="resultados"></div>

    <div class="section">Agenda de Jogos</div>
    <div id="proximos"></div>
</div>

<script>
    // Configurações (Basta mudar o ID para outro time)
    const API_KEY = "d232ddb528msh218d515e9566e6cp1794e6jsn8fbcfd203787";
    const TEAM_ID = 121; // 121: Palmeiras, 131: Corinthians, 126: São Paulo, 128: Santos
    const TEAM_NAME = "Palmeiras";

    document.getElementById('nome-time').innerText = TEAM_NAME;

    async function buscarDados() {
        // Buscamos tudo de uma vez (economiza pedidos)
        // Pedimos os últimos 3 e os próximos 3. Total: 1 pedido na API!
        const url = `https://v3.football.api-sports.io/fixtures?team=${TEAM_ID}&last=6`;
        
        try {
            const response = await fetch(url, {
                headers: {
                    "x-rapidapi-key": API_KEY,
                    "x-rapidapi-host": "v3.football.api-sports.io"
                }
            });
            const data = await response.json();
            const partidas = data.response;

            if(!partidas) throw new Error("Assine o plano Free da API-Football (v3) no RapidAPI");

            const resDiv = document.getElementById('resultados');
            const proxDiv = document.getElementById('proximos');

            partidas.forEach(m => {
                const isFinished = m.fixture.status.short === "FT";
                const dataFormat = new Date(m.fixture.date).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
                
                const html = `
                    <div class="match">
                        <div class="t-name" style="text-align:right"><b>${m.teams.home.name}</b></div>
                        <div class="score-area">
                            <span class="score">${isFinished ? m.goals.home + ' - ' + m.goals.away : 'vs'}</span>
                            <span class="m-date">${dataFormat}</span>
                        </div>
                        <div class="t-name" style="text-align:left"><b>${m.teams.away.name}</b></div>
                    </div>`;

                if(isFinished) resDiv.innerHTML += html;
                else proxDiv.innerHTML += html;
            });

        } catch (err) {
            document.getElementById('resultados').innerHTML = `<div style="padding:15px; color:red; font-size:0.7rem;">${err.message}</div>`;
        }
    }

    buscarDados();
</script>
</body>
</html>
