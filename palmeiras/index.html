<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmeiras - Resultados</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #006400; margin-bottom: 5px; }
        .jogo { border-bottom: 1px solid #eee; padding: 15px 0; }
        .placar { font-weight: bold; font-size: 1.1em; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 0.75em; color: #666; margin-bottom: 5px; }
        .destaque { color: #006400; font-weight: bold; border: 1px solid #006400; border-radius: 5px; padding: 2px 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚽ Palmeiras</h1>
        <p>Jogos Encontrados Hoje</p>
        <hr>
        <div id="jogos">Buscando partidas...</div>
    </div>

    <script>
    const apiKey = "d232ddb528msh218d515e9566e6cp1794e6jsn8fbcfd203787";
    
    // Endpoint de Classificação (Standings) da Série A - ID 325 é o Brasileirão
    const url = "https://free-api-live-football-data.p.rapidapi.com/football-get-standing-all?league_id=325";

    fetch(url, {
        method: "GET",
        headers: {
            "x-rapidapi-key": apiKey,
            "x-rapidapi-host": "free-api-live-football-data.p.rapidapi.com"
        }
    })
    .then(response => {
        if (!response.ok) throw new Error("Erro na API: " + response.status);
        return response.json();
    })
    .then(data => {
        const container = document.getElementById("jogos");
        
        // Nessa API, a classificação fica em data.response.standing
        const tabela = data.response?.standing || [];
        
        // Buscamos a linha do Palmeiras na tabela
        const palmeiras = tabela.find(time => 
            time.team?.name?.includes("Palmeiras")
        );

        if (!palmeiras) {
            container.innerHTML = "Palmeiras não encontrado na tabela ou campeonato encerrado.";
            return;
        }

        // Montando um visual de "Card de Classificação"
        const pos = palmeiras.position;
        const pts = palmeiras.points;
        const v = palmeiras.won;
        const e = palmeiras.draw;
        const d = palmeiras.lost;

        container.innerHTML = `
            <div style="padding: 20px;">
                <h3 style="margin: 0; color: #006400;">Brasileirão Série A</h3>
                <div style="font-size: 3em; font-weight: bold; margin: 10px 0;">${pos}º</div>
                <p style="font-size: 1.2em;">${pts} Pontos</p>
                <hr>
                <div style="display: flex; justify-content: space-around; font-size: 0.9em;">
                    <span>Vitórias: <b>${v}</b></span>
                    <span>Empates: <b>${e}</b></span>
                    <span>Derrotas: <b>${d}</b></span>
                </div>
            </div>
        `;
    })
    .catch(err => {
        console.error(err);
        document.getElementById("jogos").innerHTML = "Erro ao carregar classificação.";
    });
</script>
</body>
</html>
