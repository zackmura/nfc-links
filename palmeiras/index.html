<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmeiras - Mini Mundo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .widget { width: 100%; max-width: 420px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); overflow: hidden; }
        
        .header { background: #006400; color: white; padding: 15px; text-align: center; display: flex; flex-direction: column; align-items: center; border-bottom: 4px solid #ffcc00; }
        .header img { width: 60px; height: 60px; margin-bottom: 8px; object-fit: contain; }
        .header span { font-weight: bold; font-size: 1.1rem; letter-spacing: 1px; }

        .section-title { font-size: 0.75rem; color: #666; padding: 10px 15px 5px; background: #f8f9fa; text-transform: uppercase; border-top: 1px solid #eee; }
        
        .match-card { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid #eee; }
        .team-col { flex: 1; display: flex; align-items: center; font-size: 0.85rem; color: #333; font-weight: 500; }
        .team-col img { width: 28px; height: 28px; object-fit: contain; }
        .home { justify-content: flex-end; text-align: right; }
        .away { justify-content: flex-start; text-align: left; }
        .home img { margin-left: 8px; }
        .away img { margin-right: 8px; }

        .score-box { width: 85px; text-align: center; background: #f0f0f0; border-radius: 8px; padding: 6px 0; margin: 0 5px; }
        .score { font-weight: bold; font-size: 1.1rem; color: #000; display: block; line-height: 1; }
        .date { font-size: 0.65rem; color: #888; margin-top: 4px; display: block; }
        
        .error-msg { color: #cc0000; padding: 15px; font-size: 0.85rem; text-align: center; }
    </style>
</head>
<body>

<div class="widget">
    <div class="header">
        <img id="escudo-topo" src="" alt="Escudo">
        <span>PALMEIRAS</span>
    </div>
    
    <div class="section-title">Últimos Resultados</div>
    <div id="resultados"><p style='padding:15px; text-align:center;'>Carregando...</p></div>

    <div class="section-title">Próximas Partidas</div>
    <div id="agenda"><p style='padding:15px; text-align:center;'>Carregando...</p></div>
</div>

<script>
    const API_KEY = "d232ddb528msh218d515e9566e6cp1794e6jsn8fbcfd203787";
    const API_HOST = "sportapi7.p.rapidapi.com";
    const TEAM_ID = "1963";

    // Fonte de imagens atualizada para o domínio público .com
    const imgBase = `https://api.sofascore.com/api/v1/team/`;

    async function buscarDados() {
        const resDiv = document.getElementById("resultados");
        const ageDiv = document.getElementById("agenda");
        
        // Define o escudo do topo
        document.getElementById('escudo-topo').src = `${imgBase}${TEAM_ID}/image`;

        const headers = { "x-rapidapi-key": API_KEY, "x-rapidapi-host": API_HOST };

        try {
            // Requisição 1: Resultados passados
            const resPast = await fetch(`https://${API_HOST}/api/v1/team/${TEAM_ID}/events/last/0`, { headers });
            
            if (resPast.status === 429) {
                throw new Error("Muitos acessos simultâneos (Erro 429). Por favor, aguarde alguns segundos e atualize a página.");
            }
            if (!resPast.ok) {
                 throw new Error(`Erro na API: ${resPast.status}`);
            }
            const dataPast = await resPast.json();

            // Opcional: Um pequeno delay entre as requisições para evitar o bloqueio por velocidade
            await new Promise(resolve => setTimeout(resolve, 500)); 

            // Requisição 2: Próximos jogos
            const resNext = await fetch(`https://${API_HOST}/api/v1/team/${TEAM_ID}/events/next/0`, { headers });
            
            if (resNext.status === 429) {
                throw new Error("Muitos acessos simultâneos (Erro 429). Por favor, aguarde alguns segundos e atualize a página.");
            }
            const dataNext = await resNext.json();

            resDiv.innerHTML = "";
            ageDiv.innerHTML = "";

            // Renderizar passados
            if (dataPast.events) {
                const ordenados = dataPast.events.sort((a, b) => b.startTimestamp - a.startTimestamp);
                ordenados.slice(0, 5).forEach(e => resDiv.innerHTML += criarCard(e, true));
            }

            // Renderizar futuros
            if (dataNext.events && dataNext.events.length > 0) {
                dataNext.events.slice(0, 5).forEach(e => ageDiv.innerHTML += criarCard(e, false));
            } else {
                ageDiv.innerHTML = "<p style='padding:15px; font-size:0.8rem; text-align:center;'>Nenhum jogo agendado.</p>";
            }
        } catch (err) {
            console.error(err);
            resDiv.innerHTML = `<div class='error-msg'>${err.message}</div>`;
            ageDiv.innerHTML = "";
        }
    }

    function criarCard(e, isFinished) {
        const dataObj = new Date(e.startTimestamp * 1000);
        const dataF = dataObj.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
        const horaF = dataObj.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        
        const infoPlacar = isFinished ? `${e.homeScore.current} - ${e.awayScore.current}` : horaF;

        const homeId = e.homeTeam.id;
        const awayId = e.awayTeam.id;

        return `
            <div class="match-card">
                <div class="team-col home">
                    ${e.homeTeam.shortName || e.homeTeam.name}
                    <img src="${imgBase}${homeId}/image" alt=" ">
                </div>
                <div class="score-box">
                    <span class="score">${infoPlacar}</span>
                    <span class="date">${dataF}</span>
                </div>
                <div class="team-col away">
                    <img src="${imgBase}${awayId}/image" alt=" ">
                    ${e.awayTeam.shortName || e.awayTeam.name}
                </div>
            </div>`;
    }

    buscarDados();
</script>

</body>
</html>
