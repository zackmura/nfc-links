<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmeiras - Mini Mundo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .widget { width: 100%; max-width: 420px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: #006400; color: white; padding: 15px; text-align: center; display: flex; flex-direction: column; align-items: center; border-bottom: 4px solid #ffcc00; }
        .header img { width: 60px; height: 60px; margin-bottom: 8px; object-fit: contain; }
        .header span { font-weight: bold; font-size: 1.1rem; letter-spacing: 1px; }
        .section-title { font-size: 0.75rem; color: #666; padding: 10px 15px 5px; background: #f8f9fa; text-transform: uppercase; border-top: 1px solid #eee; display: flex; justify-content: space-between;}
        .cache-info { font-size: 0.6rem; color: #aaa; text-transform: none; }
        .match-card { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid #eee; }
        .team-col { flex: 1; display: flex; align-items: center; font-size: 0.85rem; color: #333; font-weight: 500; }
        .team-col img { width: 28px; height: 28px; object-fit: contain; }
        .home { justify-content: flex-end; text-align: right; }
        .away { justify-content: flex-start; text-align: left; }
        .home img { margin-left: 8px; }
        .away img { margin-right: 8px; }
        .score-box { width: 85px; text-align: center; background: #f0f0f0; border-radius: 8px; padding: 6px 0; margin: 0 5px; }
        .score { font-weight: bold; font-size: 1.1rem; color: #000; display: block; line-height: 1; }
        .date { font-size: 0.65rem; color: #888; margin-top: 4px; display: block; }
    </style>
</head>
<body>

<div class="widget">
    <div class="header">
        <img src="https://a.espncdn.com/i/teamlogos/soccer/500/2029.png" alt="Escudo">
        <span>PALMEIRAS</span>
    </div>
    
    <div class="section-title">
        Últimos Resultados <span class="cache-info" id="status-update">Buscando...</span>
    </div>
    <div id="resultados"><p style='padding:15px; text-align:center;'>Conectando ao banco de dados...</p></div>

    <div class="section-title">Próximas Partidas</div>
    <div id="agenda"><p style='padding:15px; text-align:center;'>Aguarde...</p></div>
</div>

<script>
    // Conexão direta com a sua API construída no Google Sheets
    const MINHA_API_GOOGLE = "https://script.google.com/macros/s/AKfycbwEjviHWdcxWVFc6hDAhyNE0JCH41J_DzDnUvIAlXosqihM83n1nRfe-WZUWUZs9nOb/exec"; 

    async function carregarDoMeuServidor() {
        const resDiv = document.getElementById("resultados");
        const ageDiv = document.getElementById("agenda");
        const statusUpdate = document.getElementById("status-update");

        try {
            const resposta = await fetch(MINHA_API_GOOGLE);
            const dados = await resposta.json();

            resDiv.innerHTML = "";
            ageDiv.innerHTML = "";
            statusUpdate.innerText = `Atualizado: ${dados.lastUpdate}`;

            if (dados.past && dados.past.length > 0) {
                dados.past.forEach(e => resDiv.innerHTML += criarCard(e, true));
            } else {
                resDiv.innerHTML = "<p style='padding:15px; text-align:center;'>Sem dados recentes.</p>";
            }

            if (dados.next && dados.next.length > 0) {
                dados.next.forEach(e => ageDiv.innerHTML += criarCard(e, false));
            } else {
                ageDiv.innerHTML = "<p style='padding:15px; text-align:center; color:#666;'>Nenhum jogo na agenda.</p>";
            }

        } catch (err) {
            console.error(err);
            resDiv.innerHTML = "<div style='padding:15px; color:red; text-align:center;'>Erro de conexão com o painel.</div>";
            ageDiv.innerHTML = "";
            statusUpdate.innerText = "Offline";
        }
    }

   function criarCard(e, isFinished) {
        const dataObj = new Date(e.date);
        const dataF = dataObj.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
        const horaF = dataObj.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        
        const infoPlacar = isFinished ? `${e.homeScore} - ${e.awayScore}` : horaF;

        // Escudo genérico desenhado direto no código (à prova de falhas na internet)
        const escudoFallback = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='28' height='28'><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='20'>🛡️</text></svg>";

        return `
            <div class="match-card">
                <div class="team-col home">
                    ${e.homeTeam}
                    <img src="${e.homeLogo}" onerror="this.onerror=null; this.src='${escudoFallback}'">
                </div>
                <div class="score-box">
                    <span class="score">${infoPlacar}</span>
                    <span class="date">${dataF}</span>
                </div>
                <div class="team-col away">
                    <img src="${e.awayLogo}" onerror="this.onerror=null; this.src='${escudoFallback}'">
                    ${e.awayTeam}
                </div>
            </div>`;
    }

    carregarDoMeuServidor();
</script>

</body>
</html>
