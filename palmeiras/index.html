<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmeiras - Interativo</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .jogo { border-bottom: 1px solid #ccc; padding: 10px; margin: 5px; }
        .placar { font-weight: bold; font-size: 1.2em; color: #006400; }
    </style>
</head>
<body>

    <h1>⚽ Palmeiras</h1>
    <h2>Últimos Resultados</h2>
    <div id="jogos">Carregando informações...</div>

    <script>
        const apiKey = "d232ddb528msh218d515e9566e6cp1794e6jsn8fbcfd203787";
        // O ID 121 é o padrão do Palmeiras na maioria das APIs de futebol
        const url = "https://free-api-live-football-data.p.rapidapi.com/football-get-list-all-fixtures-by-team?team_id=121";

        fetch(url, {
            method: "GET",
            headers: {
                "x-rapidapi-key": apiKey,
                "x-rapidapi-host": "free-api-live-football-data.p.rapidapi.com"
            }
        })
        .then(response => {
            if (!response.ok) throw new Error("Erro na requisição: " + response.status);
            return response.json();
        })
        .then(data => {
            const container = document.getElementById("jogos");
            let html = "";

            // A estrutura dessa API geralmente entrega os dados em data.response.list
            const listaJogos = data.response?.list || [];

            if (listaJogos.length === 0) {
                container.innerHTML = "Nenhum jogo recente encontrado.";
                return;
            }

            // Pegamos apenas os últimos 5 jogos
            listaJogos.slice(0, 5).forEach(jogo => {
                const casa = jogo.home_team.name;
                const fora = jogo.away_team.name;
                const golsCasa = jogo.home_score.current !== undefined ? jogo.home_score.current : "?";
                const golsFora = jogo.away_score.current !== undefined ? jogo.away_score.current : "?";
                const status = jogo.status.type === "finished" ? "Encerrado" : "Em breve";

                html += `
                    <div class="jogo">
                        <p><small>${status}</small></p>
                        <p class="placar">${casa} ${golsCasa} x ${golsFora} ${fora}</p>
                    </div>
                `;
            });

            container.innerHTML = html;
        })
        .catch(err => {
            console.error(err);
            document.getElementById("jogos").innerHTML = "Erro ao carregar dados. Verifique a assinatura da API.";
        });
    </script>
</body>
</html>
