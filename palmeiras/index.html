<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmeiras Interativo - Mini Mundo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ececec; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .widget { width: 100%; max-width: 400px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #006400; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .section-title { font-size: 0.8rem; color: #666; padding: 10px 15px 5px; background: #f9f9f9; text-transform: uppercase; }
        .match-card { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
        .team { flex: 1; font-size: 0.9rem; font-weight: 500; }
        .score { width: 60px; text-align: center; font-weight: bold; font-size: 1.1rem; color: #333; }
        .vs { color: #999; font-weight: normal; font-size: 0.8rem; }
        .date { font-size: 0.7rem; color: #888; text-align: center; padding-top: 5px; }
        .badge { font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; background: #eee; margin-bottom: 4px; display: inline-block; }
    </style>
</head>
<body>

<div class="widget">
    <div class="header">⚽ SOCIEDADE ESPORTIVA PALMEIRAS</div>
    
    <div class="section-title">Últimos Resultados</div>
    <div id="resultados"></div>

    <div class="section-title">Próximas Partidas</div>
    <div id="agenda"></div>
</div>

<script>
    const apiKey = "d232ddb528msh218d515e9566e6cp1794e6jsn8fbcfd203787";
    const teamId = 121; // ID do Palmeiras

    // Buscar últimos 2 resultados
    fetch(`https://v3.football.api-sports.io/fixtures?team=${teamId}&last=2`, {
        headers: { "x-rapidapi-key": apiKey, "x-rapidapi-host": "v3.football.api-sports.io" }
    })
    .then(r => r.json())
    .then(data => renderMatches(data.response, 'resultados'));

    // Buscar próximas 2 partidas
    fetch(`https://v3.football.api-sports.io/fixtures?team=${teamId}&next=2`, {
        headers: { "x-rapidapi-key": apiKey, "x-rapidapi-host": "v3.football.api-sports.io" }
    })
    .then(r => r.json())
    .then(data => renderMatches(data.response, 'agenda'));

    function renderMatches(matches, elementId) {
        const container = document.getElementById(elementId);
        if (!matches || matches.length === 0) {
            container.innerHTML = "<p style='padding:15px; font-size:0.8rem;'>Sem dados disponíveis.</p>";
            return;
        }

        matches.forEach(m => {
            const date = new Date(m.fixture.date).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
            const home = m.teams.home.name;
            const away = m.teams.away.name;
            const scoreHome = m.goals.home ?? "";
            const scoreAway = m.goals.away ?? "";
            const isFinished = m.fixture.status.short === "FT";

            container.innerHTML += `
                <div class="match-card">
                    <div class="team" style="text-align:right">${home}</div>
                    <div class="score">
                        ${isFinished ? `${scoreHome} - ${scoreAway}` : `<span class="vs">VS</span>`}
                        <div class="date">${date}</div>
                    </div>
                    <div class="team" style="text-align:left">${away}</div>
                </div>
            `;
        });
    }
</script>

</body>
</html>
